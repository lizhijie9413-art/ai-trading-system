<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>

<title>AI Register</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}

body{
    background:#050816;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    position:relative;
    overflow-x:hidden;
}

/* 动态背景光晕 */
body::before{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background:#00f0ff33;
    filter:blur(120px);
    top:-100px;
    left:-100px;
    animation:glowMove1 8s ease-in-out infinite alternate;
    z-index:0;
}

body::after{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background:#7b00ff33;
    filter:blur(120px);
    bottom:-100px;
    right:-100px;
    animation:glowMove2 10s ease-in-out infinite alternate;
    z-index:0;
}

@keyframes glowMove1{
    0%{transform:translate(0,0); opacity:0.3;}
    100%{transform:translate(80px,50px); opacity:0.6;}
}

@keyframes glowMove2{
    0%{transform:translate(0,0); opacity:0.2;}
    100%{transform:translate(-60px,-70px); opacity:0.5;}
}

/* 粒子效果 */
.particles{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:0;
    pointer-events:none;
}
.particle{
    position:absolute;
    width:2px;
    height:2px;
    background:rgba(139,92,246,0.6);
    border-radius:50%;
    animation:floatParticle 8s linear infinite;
}
@keyframes floatParticle{
    0%{transform:translateY(0) translateX(0); opacity:0;}
    50%{opacity:0.8;}
    100%{transform:translateY(-100px) translateX(30px); opacity:0;}
}

.register-container{
    position:relative;
    width:100%;
    max-width:400px;
    padding:40px;
    border-radius:28px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    box-shadow:0 0 30px rgba(0,255,255,0.15),0 0 60px rgba(123,0,255,0.1);
    z-index:10;
    animation:fadeInUp 0.6s ease;
}

@keyframes fadeInUp{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

.logo{
    text-align:center;
    color:white;
    font-size:34px;
    font-weight:bold;
    margin-bottom:8px;
}
.logo span{
    background:linear-gradient(135deg,#00f0ff,#7b00ff);
    -webkit-background-clip:text;
    color:transparent;
}
.subtitle{
    text-align:center;
    color:#94a3b8;
    margin-bottom:35px;
    font-size:14px;
}

.input-box{
    margin-bottom:20px;
}
.input-box input{
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:15px;
    outline:none;
    transition:all 0.3s ease;
}
.input-box input:focus{
    border:1px solid #00f0ff;
    box-shadow:0 0 15px rgba(0,240,255,0.3);
    background:rgba(255,255,255,0.12);
}
.input-box input::placeholder{
    color:#64748b;
}

.password-strength{
    margin-top:8px;
    font-size:12px;
    height:20px;
}
.strength-weak{color:#ff4d6d;}
.strength-medium{color:#ffaa00;}
.strength-strong{color:#00f5a0;}

.register-btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:18px;
    background:linear-gradient(90deg,#00f0ff,#7b00ff);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:all 0.3s ease;
    position:relative;
    overflow:hidden;
}
.register-btn::before{
    content:'';
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
    transition:left 0.5s ease;
}
.register-btn:hover::before{
    left:100%;
}
.register-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 0 30px rgba(0,240,255,0.4);
}
.register-btn:disabled{
    opacity:0.6;
    cursor:not-allowed;
    transform:none;
}

.loading-spinner{
    display:inline-block;
    width:18px;
    height:18px;
    border:2px solid rgba(255,255,255,.3);
    border-radius:50%;
    border-top-color:white;
    animation:spin 0.6s linear infinite;
    margin-right:8px;
    vertical-align:middle;
}
@keyframes spin{
    to{transform:rotate(360deg);}
}

.message-box{
    margin-top:20px;
    padding:12px;
    border-radius:14px;
    text-align:center;
    font-size:13px;
    display:none;
}
.success-box{
    background:rgba(0,255,157,0.12);
    color:#00ff9d;
    border:1px solid rgba(0,255,157,0.3);
}
.error-box{
    background:rgba(255,77,109,0.12);
    color:#ff4d6d;
    border:1px solid rgba(255,77,109,0.3);
}

.login-link{
    margin-top:24px;
    text-align:center;
    color:#94a3b8;
    font-size:14px;
}
.login-link a{
    color:#00f0ff;
    text-decoration:none;
    transition:all 0.3s ease;
}
.login-link a:hover{
    text-shadow:0 0 10px #00f0ff;
}

/* 装饰圆环 */
.ai-circle{
    position:absolute;
    width:140px;
    height:140px;
    border:2px solid rgba(0,240,255,0.3);
    border-radius:50%;
    top:-70px;
    right:-70px;
    animation:rotate 12s linear infinite;
}
.ai-circle::before{
    content:"";
    position:absolute;
    inset:20px;
    border:2px solid rgba(123,0,255,0.3);
    border-radius:50%;
    animation:rotateReverse 8s linear infinite;
}
.ai-circle::after{
    content:"";
    position:absolute;
    inset:45px;
    border:1px solid rgba(0,240,255,0.2);
    border-radius:50%;
}
@keyframes rotate{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}
@keyframes rotateReverse{
    from{transform:rotate(0deg);}
    to{transform:rotate(-360deg);}
}

/* 底部装饰光晕 */
.glow-bottom{
    position:absolute;
    bottom:-50px;
    left:50%;
    transform:translateX(-50%);
    width:200px;
    height:80px;
    background:radial-gradient(circle,rgba(0,240,255,0.2),transparent 70%);
    filter:blur(20px);
    animation:pulseGlow 3s ease-in-out infinite;
}
@keyframes pulseGlow{
    0%,100%{opacity:0.5;}
    50%{opacity:1;}
}
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="register-container">
    <div class="ai-circle"></div>
    <div class="glow-bottom"></div>

    <div class="logo">
        AI <span>TRADING</span>
    </div>
    <div class="subtitle">
        Create Your Future AI Investment Account
    </div>

    <div class="input-box">
        <input type="text" id="username" placeholder="Username" autocomplete="off">
    </div>

    <div class="input-box">
        <input type="email" id="email" placeholder="Email" autocomplete="off">
    </div>

    <div class="input-box">
        <input type="password" id="password" placeholder="Password (min 6 characters)">
    </div>
    <div class="password-strength" id="strengthText"></div>

    <div class="input-box">
        <input type="password" id="confirmPassword" placeholder="Confirm Password">
    </div>

    <button class="register-btn" id="registerBtn" onclick="register()">
        CREATE ACCOUNT
    </button>

    <div class="message-box success-box" id="successBox">
        Registration Successful! Redirecting...
    </div>

    <div class="message-box error-box" id="errorBox">
        Registration Failed
    </div>

    <div class="login-link">
        Already have account?
        <a href="login.html">Login</a>
    </div>
</div>

<script src="config.js"></script>
<script>
// ==================== 粒子效果 ====================
const particlesContainer = document.getElementById('particles');
for(let i=0;i<50;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 5 + 's';
    p.style.animationDuration = (5 + Math.random() * 10) + 's';
    p.style.width = (1 + Math.random() * 3) + 'px';
    p.style.height = p.style.width;
    particlesContainer.appendChild(p);
}

// ==================== 密码强度检测 ====================
function checkPasswordStrength(password){
    const strengthDiv = document.getElementById("strengthText");
    if(!password){
        strengthDiv.innerHTML = "";
        return;
    }
    let strength = 0;
    if(password.length >= 6) strength++;
    if(password.length >= 8) strength++;
    if(/[A-Z]/.test(password)) strength++;
    if(/[0-9]/.test(password)) strength++;
    if(/[^A-Za-z0-9]/.test(password)) strength++;
    
    let strengthText = "", strengthClass = "";
    if(strength <= 2){
        strengthText = "Weak password";
        strengthClass = "strength-weak";
    } else if(strength <= 4){
        strengthText = "Medium password";
        strengthClass = "strength-medium";
    } else {
        strengthText = "Strong password";
        strengthClass = "strength-strong";
    }
    strengthDiv.innerHTML = `<span class="${strengthClass}">${strengthText}</span>`;
}

// ==================== 显示消息 ====================
function showMessage(type, text){
    const successBox = document.getElementById("successBox");
    const errorBox = document.getElementById("errorBox");
    successBox.style.display = "none";
    errorBox.style.display = "none";
    
    if(type === "success"){
        successBox.innerHTML = text || "Registration Successful! Redirecting...";
        successBox.style.display = "block";
    } else {
        errorBox.innerHTML = text || "Registration Failed";
        errorBox.style.display = "block";
    }
}

// ==================== 注册函数 ====================
async function register(){
    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const btn = document.getElementById("registerBtn");
    
    // 清空之前的消息
    showMessage("", "");
    
    // 验证输入
    if(!username || !email || !password || !confirmPassword){
        showMessage("error", "Please fill in all fields");
        return;
    }
    
    // 用户名长度验证
    if(username.length < 3){
        showMessage("error", "Username must be at least 3 characters");
        return;
    }
    
    // 邮箱格式验证
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if(!emailRegex.test(email)){
        showMessage("error", "Please enter a valid email address");
        return;
    }
    
    // 密码长度验证
    if(password.length < 6){
        showMessage("error", "Password must be at least 6 characters");
        return;
    }
    
    // 确认密码匹配
    if(password !== confirmPassword){
        showMessage("error", "Passwords do not match");
        return;
    }
    
    // 显示加载状态
    const originalText = btn.innerText;
    btn.disabled = true;
    btn.innerHTML = '<div class="loading-spinner"></div> CREATING...';
    
    try{
        const result = await apiRequest("/api/register", {
            method: "POST",
            body: JSON.stringify({
                username: username,
                email: email,
                password: password
            })
        });
        
        if(result.success && result.data && result.data.user){
            showMessage("success", "Registration Successful! Redirecting...");
            
            // 保存用户基本信息到本地
            localStorage.setItem("username", username);
            
            setTimeout(() => {
                window.location.href = "login.html";
            }, 1500);
        } else {
            showMessage("error", result.data?.message || "Registration failed");
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
        
    } catch(err){
        console.error("Registration error:", err);
        showMessage("error", "Network error. Please check your connection and try again.");
        btn.disabled = false;
        btn.innerHTML = originalText;
    }
}

// ==================== 实时密码强度检测 ====================
document.getElementById("password").addEventListener("input", function(e){
    checkPasswordStrength(e.target.value);
});

// ==================== 回车键注册 ====================
document.getElementById("confirmPassword").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        register();
    }
});
</script>
</body>
</html>
