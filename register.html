<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>

<title>AI Register</title>

<style>
/* 你的CSS代码保持不变... 太长省略，请保留原有的所有style */
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="register-container">
    <div class="ai-circle"></div>
    <div class="glow-bottom"></div>

    <div class="logo">
        AI <span>TRADING</span>
    </div>
    <div class="subtitle">
        Create Your Future AI Investment Account
    </div>

    <div class="input-box">
        <input type="text" id="username" placeholder="Username" autocomplete="off">
    </div>

    <div class="input-box">
        <input type="email" id="email" placeholder="Email" autocomplete="off">
    </div>

    <div class="input-box">
        <input type="password" id="password" placeholder="Password (min 6 characters)">
    </div>
    <div class="password-strength" id="strengthText"></div>

    <div class="input-box">
        <input type="password" id="confirmPassword" placeholder="Confirm Password">
    </div>

    <button class="register-btn" id="registerBtn" onclick="register()">
        CREATE ACCOUNT
    </button>

    <div class="message-box success-box" id="successBox">
        Registration Successful! Redirecting...
    </div>

    <div class="message-box error-box" id="errorBox">
        Registration Failed
    </div>

    <div class="login-link">
        Already have account?
        <a href="login.html">Login</a>
    </div>
</div>

<script>
// ==================== 直接写入 config.js 的代码 ====================
const API_BASE = "https://ai-trading-system-j5jf.onrender.com";

function getCurrentUser() {
    try {
        const user = localStorage.getItem("user");
        return user ? JSON.parse(user) : null;
    } catch (e) {
        return null;
    }
}

function getAuthHeaders() {
    const user = getCurrentUser();
    const headers = { "Content-Type": "application/json" };
    
    if (user && user.id) {
        headers["user-id"] = user.id;
    }
    
    const adminAuth = localStorage.getItem("adminAuth");
    if (adminAuth) {
        try {
            const admin = JSON.parse(adminAuth);
            if (admin.role === "admin") {
                headers["admin-token"] = "AI_ADMIN_2026";
            }
        } catch (e) {}
    }
    
    return headers;
}

async function apiRequest(endpoint, options = {}) {
    const url = endpoint.startsWith("http") ? endpoint : `${API_BASE}${endpoint}`;
    const defaultOptions = { headers: getAuthHeaders() };
    
    const mergedOptions = {
        ...defaultOptions,
        ...options,
        headers: { ...defaultOptions.headers, ...options.headers }
    };
    
    try {
        const response = await fetch(url, mergedOptions);
        const data = await response.json();
        return { success: true, data, response };
    } catch (error) {
        console.error(`API Failed: ${endpoint}`, error);
        return { success: false, error: error.message };
    }
}

// ==================== 粒子效果 ====================
const particlesContainer = document.getElementById('particles');
for(let i=0;i<50;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 5 + 's';
    p.style.animationDuration = (5 + Math.random() * 10) + 's';
    p.style.width = (1 + Math.random() * 3) + 'px';
    p.style.height = p.style.width;
    particlesContainer.appendChild(p);
}

// ==================== 密码强度检测 ====================
function checkPasswordStrength(password){
    const strengthDiv = document.getElementById("strengthText");
    if(!password){
        strengthDiv.innerHTML = "";
        return;
    }
    let strength = 0;
    if(password.length >= 6) strength++;
    if(password.length >= 8) strength++;
    if(/[A-Z]/.test(password)) strength++;
    if(/[0-9]/.test(password)) strength++;
    if(/[^A-Za-z0-9]/.test(password)) strength++;
    
    let strengthText = "", strengthClass = "";
    if(strength <= 2){
        strengthText = "Weak password";
        strengthClass = "strength-weak";
    } else if(strength <= 4){
        strengthText = "Medium password";
        strengthClass = "strength-medium";
    } else {
        strengthText = "Strong password";
        strengthClass = "strength-strong";
    }
    strengthDiv.innerHTML = `<span class="${strengthClass}">${strengthText}</span>`;
}

// ==================== 显示消息 ====================
function showMessage(type, text){
    const successBox = document.getElementById("successBox");
    const errorBox = document.getElementById("errorBox");
    successBox.style.display = "none";
    errorBox.style.display = "none";
    
    if(type === "success"){
        successBox.innerHTML = text || "Registration Successful! Redirecting...";
        successBox.style.display = "block";
    } else {
        errorBox.innerHTML = text || "Registration Failed";
        errorBox.style.display = "block";
    }
}

// ==================== 注册函数 ====================
async function register(){
    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const btn = document.getElementById("registerBtn");
    
    showMessage("", "");
    
    if(!username || !email || !password || !confirmPassword){
        showMessage("error", "Please fill in all fields");
        return;
    }
    
    if(username.length < 3){
        showMessage("error", "Username must be at least 3 characters");
        return;
    }
    
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if(!emailRegex.test(email)){
        showMessage("error", "Please enter a valid email address");
        return;
    }
    
    if(password.length < 6){
        showMessage("error", "Password must be at least 6 characters");
        return;
    }
    
    if(password !== confirmPassword){
        showMessage("error", "Passwords do not match");
        return;
    }
    
    const originalText = btn.innerText;
    btn.disabled = true;
    btn.innerHTML = '<div class="loading-spinner"></div> CREATING...';
    
    try{
        const result = await apiRequest("/api/register", {
            method: "POST",
            body: JSON.stringify({
                username: username,
                email: email,
                password: password
            })
        });
        
        if(result.success && result.data && result.data.user){
            showMessage("success", "Registration Successful! Redirecting...");
            localStorage.setItem("username", username);
            setTimeout(() => {
                window.location.href = "login.html";
            }, 1500);
        } else {
            showMessage("error", result.data?.message || "Registration failed");
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
        
    } catch(err){
        console.error("Registration error:", err);
        showMessage("error", "Network error. Please check your connection and try again.");
        btn.disabled = false;
        btn.innerHTML = originalText;
    }
}

document.getElementById("password").addEventListener("input", function(e){
    checkPasswordStrength(e.target.value);
});

document.getElementById("confirmPassword").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        register();
    }
});
</script>
</body>
</html>
