<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
<title>订单管理</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#07070b;color:white;}

/* 侧边栏 */
.sidebar{width:260px;height:100vh;background:#151515;position:fixed;left:0;top:0;padding-top:25px;}
.sidebar h2{color:#7c4dff;padding-left:22px;margin-bottom:35px;font-size:20px;}
.sidebar a{display:block;color:white;text-decoration:none;padding:15px 22px;font-size:17px;font-weight:bold;}
.sidebar a:hover,.sidebar a.active{background:#252525;color:#7c4dff;}

/* 主内容区 - 移动端适配 */
.main{margin-left:260px;padding:35px;overflow-x:auto;}
h1{font-size:48px;color:#7c4dff;margin-bottom:28px;}

/* 统计卡片 */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:25px;}
.stat-card{background:#171717;border:1px solid #333;border-radius:16px;padding:22px;}
.stat-card p{color:#aaa;font-size:14px;}
.stat-card h2{color:#7c4dff;margin-top:12px;font-size:28px;}

/* 搜索框 */
.search-box{margin-bottom:20px;}
#searchInput{width:100%;max-width:400px;padding:14px;border-radius:10px;border:none;background:#1f1f1f;color:white;font-size:15px;outline:none;}

/* 表格 - 移动端横向滚动 */
.table-wrapper{overflow-x:auto;border-radius:16px;border:1px solid #333;background:#121212;}
table{width:100%;border-collapse:collapse;min-width:1200px;}
th,td{border:1px solid #333;padding:14px;text-align:center;font-size:14px;}
th{background:#1d1d1d;color:#ddd;font-weight:bold;}
tr:hover{background:#1a1a1a;}

/* 状态颜色 */
.profit.positive{color:#00ff88;font-weight:bold;}
.profit.negative{color:#ff4d6d;font-weight:bold;}
.status.running{color:#ffaa00;font-weight:bold;}
.status.completed{color:#00ff88;font-weight:bold;}
.status.cancelled{color:#ff4d6d;font-weight:bold;}

/* 按钮 */
.detail-btn{background:#2979ff;color:white;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:bold;}
.detail-btn:hover{background:#1e60cc;}

/* 弹窗 */
.modal{display:none;position:fixed;z-index:1000;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(5px);}
.modal-content{background:linear-gradient(145deg,#121212,#1a1a1a);width:90%;max-width:500px;margin:50px auto;padding:25px;border-radius:20px;border:1px solid #7c4dff;box-shadow:0 0 40px rgba(124,77,255,.2);}
.modal-content h2{color:#7c4dff;margin-top:0;margin-bottom:20px;font-size:24px;}
.detail-row{margin:12px 0;font-size:15px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.08);}
.detail-row span{color:#aaa;display:inline-block;width:100px;}
.detail-row strong{color:white;}
.close-btn{background:#ff1744;color:white;border:none;padding:12px 24px;border-radius:10px;cursor:pointer;font-weight:bold;margin-top:20px;width:100%;}
.close-btn:hover{background:#d50000;}

.empty-state{text-align:center;padding:60px;color:#888;}

/* 移动端适配 */
@media (max-width: 768px){
    .sidebar{width:220px;}
    .main{margin-left:220px;padding:20px;}
    h1{font-size:32px;}
    .stats{grid-template-columns:repeat(2,1fr);gap:12px;}
    .stat-card{padding:15px;}
    .stat-card h2{font-size:22px;}
    .modal-content{width:95%;margin:20px auto;padding:20px;}
}

@media (max-width: 576px){
    .sidebar{transform:translateX(-100%);position:fixed;z-index:999;transition:0.3s;width:240px;}
    .sidebar.open{transform:translateX(0);}
    .main{margin-left:0;padding:15px;}
    .stats{grid-template-columns:1fr 1fr;}
    .modal-content .detail-row span{width:80px;font-size:13px;}
}

/* 移动端菜单按钮 */
.menu-toggle{display:none;position:fixed;top:15px;left:15px;z-index:1000;background:#7c4dff;border:none;color:white;width:44px;height:44px;border-radius:12px;font-size:20px;cursor:pointer;}
@media (max-width: 576px){.menu-toggle{display:block;}.main{padding-top:60px;}}
</style>
</head>

<script>
const adminAuth = JSON.parse(localStorage.getItem("adminAuth") || "null");

if (!adminAuth || adminAuth.role !== "admin") {
    alert("Please login as admin");
    window.location.href = "admin_login.html";
}
</script>

<body>

<button class="menu-toggle" onclick="toggleSidebar()">☰</button>

<div class="sidebar" id="sidebar">
    <h2>人工智能贸易</h2>
    <a href="dashboard.html">仪表板</a>
    <a href="trade_management.html">交易管理</a>
    <a href="user_management.html">用户管理</a>
    <a href="kyc.html">KYC审核</a>
    <a href="order_management.html" class="active">订单管理</a>
    <a href="customer_service.html">客服管理</a>
    <a href="withdraw_management.html">提现管理</a>
</div>

<div class="main">
    <h1>订单管理</h1>

    <div class="stats">
        <div class="stat-card"><p>总订单</p><h2 id="totalOrders">0</h2></div>
        <div class="stat-card"><p>已完成</p><h2 id="completedOrders">0</h2></div>
        <div class="stat-card"><p>运行中</p><h2 id="runningOrders">0</h2></div>
        <div class="stat-card"><p>总交易额</p><h2 id="totalVolume">0 USDT</h2></div>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索 UID / 用户名 / 邮箱 / 类型 / 产品 / 状态" oninput="searchOrders()">
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>订单号</th><th>UID</th><th>用户名</th><th>邮箱</th><th>类型</th>
                    <th>产品</th><th>金额</th><th>收益率</th><th>收益</th><th>状态</th><th>创建时间</th><th>操作</th>
                </tr>
            </thead>
            <tbody id="orderTable"><tr><td colspan="12" class="empty-state">加载中...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="orderModal" class="modal">
    <div class="modal-content">
        <h2 id="detailTitle">订单详情</h2>
        <div class="detail-row"><span>订单号：</span><strong id="detailOrderId"></strong></div>
        <div class="detail-row"><span>UID：</span><strong id="detailUid"></strong></div>
        <div class="detail-row"><span>用户名：</span><strong id="detailUser"></strong></div>
        <div class="detail-row"><span>邮箱：</span><strong id="detailEmail"></strong></div>
        <div class="detail-row"><span>交易类型：</span><strong id="detailType"></strong></div>
        <div class="detail-row"><span>交易产品：</span><strong id="detailCoin"></strong></div>
        <div class="detail-row"><span>订单金额：</span><strong id="detailAmount"></strong></div>
        <div class="detail-row"><span>收益率：</span><strong id="detailRate"></strong></div>
        <div class="detail-row"><span>收益：</span><strong id="detailProfit"></strong></div>
        <div class="detail-row"><span>状态：</span><strong id="detailStatus"></strong></div>
        <div class="detail-row"><span>创建时间：</span><strong id="detailTime"></strong></div>
        <div class="detail-row"><span>说明：</span><strong id="detailRemark"></strong></div>
        <button class="close-btn" onclick="closeOrderDetail()">关闭</button>
    </div>
</div>

<script>
// ==================== 配置 ====================
const API_BASE = "https://ai-trading-system-j5jf.onrender.com";
const ADMIN_TOKEN = "AI_ADMIN_2026";

let orders = [];

// ==================== 加载订单 ====================
async function loadOrders() {
    const tbody = document.getElementById("orderTable");
    tbody.innerHTML = '<tr><td colspan="12" class="empty-state">加载中...</td></tr>';
    
    try {
        const response = await fetch(`${API_BASE}/api/admin/trade-orders`, {
            headers: { "admin-token": ADMIN_TOKEN }
        });
        const result = await response.json();

        if (result.success && result.data) {
            orders = result.data || [];
        } else {
            orders = [];
        }
        renderOrders();
    } catch (err) {
        console.error(err);
        tbody.innerHTML = '<tr><td colspan="12" class="empty-state">加载失败，请检查网络</td></tr>';
    }
}

// ==================== 格式化 ====================
function formatUSDT(value) {
    return Number(value || 0).toLocaleString(undefined, {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    }) + " USDT";
}

function formatRate(value) {
    return Number(value || 0).toFixed(2) + "%";
}

function getStatusClass(status) {
    if (status === "Completed" || status === "已完成") return "completed";
    if (status === "Running" || status === "运行中") return "running";
    if (status === "Cancelled" || status === "已取消") return "cancelled";
    return "running";
}

function getStatusText(status) {
    if (status === "Completed") return "已完成";
    if (status === "Running") return "运行中";
    if (status === "Cancelled") return "已取消";
    return status || "未知";
}

// ==================== 更新统计 ====================
function updateStats() {
    document.getElementById("totalOrders").innerText = orders.length;
    document.getElementById("completedOrders").innerText = orders.filter(o => o.status === "Completed" || o.status === "已完成").length;
    document.getElementById("runningOrders").innerText = orders.filter(o => o.status === "Running" || o.status === "运行中").length;
    const totalVolume = orders.reduce((sum, o) => sum + Number(o.amount || 0), 0);
    document.getElementById("totalVolume").innerText = formatUSDT(totalVolume);
}

// ==================== 渲染表格 ====================
function renderOrders() {
    const tbody = document.getElementById("orderTable");
    
    if (orders.length === 0) {
        tbody.innerHTML = '<tr><td colspan="12" class="empty-state">暂无订单数据</td></tr>';
        updateStats();
        return;
    }
    
    tbody.innerHTML = orders.map(order => {
        const profitClass = Number(order.profit || 0) >= 0 ? "positive" : "negative";
        const profitText = Number(order.profit || 0) >= 0 ? "+" + formatUSDT(order.profit) : formatUSDT(order.profit);
        const statusClass = getStatusClass(order.status);
        const statusText = getStatusText(order.status);
        
        return `
            <tr>
                <td>${order.id || ''}</td>
                <td>${order.uid || ''}</td>
                <td>${order.user || ''}</td>
                <td>${order.email || ''}</td>
                <td>${order.type || ''}</td>
                <td>${order.coin || ''}</td>
                <td>${formatUSDT(order.amount)}</td>
                <td>${formatRate(order.rate)}</td>
                <td class="profit ${profitClass}">${profitText}</td>
                <td class="status ${statusClass}">${statusText}</td>
                <td>${order.time || ''}</td>
                <td><button class="detail-btn" onclick="showOrderDetail('${order.id}')">详情</button></td>
            </tr>
        `;
    }).join('');
    
    updateStats();
}

// ==================== 搜索 ====================
function searchOrders() {
    const keyword = document.getElementById("searchInput").value.toLowerCase();
    const rows = document.querySelectorAll("#orderTable tr");
    rows.forEach(row => {
        const text = row.innerText.toLowerCase();
        row.style.display = text.includes(keyword) ? "" : "none";
    });
}

// ==================== 显示详情 ====================
function showOrderDetail(id) {
    const order = orders.find(item => String(item.id) === String(id));
    if (!order) return;
    
    document.getElementById("detailTitle").innerText = "订单详情：" + order.id;
    document.getElementById("detailOrderId").innerText = order.id || "";
    document.getElementById("detailUid").innerText = order.uid || "";
    document.getElementById("detailUser").innerText = order.user || "";
    document.getElementById("detailEmail").innerText = order.email || "";
    document.getElementById("detailType").innerText = order.type || "";
    document.getElementById("detailCoin").innerText = order.coin || "";
    document.getElementById("detailAmount").innerText = formatUSDT(order.amount);
    document.getElementById("detailRate").innerText = formatRate(order.rate);
    document.getElementById("detailProfit").innerText = Number(order.profit || 0) >= 0 ? "+" + formatUSDT(order.profit) : formatUSDT(order.profit);
    document.getElementById("detailStatus").innerText = getStatusText(order.status);
    document.getElementById("detailTime").innerText = order.time || "";
    document.getElementById("detailRemark").innerText = order.remark || "";
    
    document.getElementById("orderModal").style.display = "block";
}

// ==================== 关闭弹窗 ====================
function closeOrderDetail() {
    document.getElementById("orderModal").style.display = "none";
}

// ==================== 侧边栏切换 ====================
function toggleSidebar() {
    const sidebar = document.getElementById("sidebar");
    sidebar.classList.toggle("open");
}

// ==================== 点击外部关闭弹窗 ====================
window.onclick = function(event) {
    const modal = document.getElementById("orderModal");
    if (event.target === modal) {
        modal.style.display = "none";
    }
};

// ==================== 页面启动 ====================
loadOrders();
setInterval(loadOrders, 30000);
</script>
</body>
</html>
