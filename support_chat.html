<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Customer Support</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
  background:
    radial-gradient(circle at top left,rgba(168,85,247,.24),transparent 30%),
    radial-gradient(circle at bottom right,rgba(56,189,248,.14),transparent 30%),
    linear-gradient(180deg,#040612,#050816,#02030a);
  color:white;
  max-width:430px;
  min-height:100vh;
  margin:0 auto;
  overflow:hidden;
  position:relative;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:radial-gradient(circle,rgba(255,255,255,.12) 1px,transparent 1px);
  background-size:38px 38px;
  opacity:.14;
  pointer-events:none;
  z-index:-1;
}

.glow-ball{
  position:fixed;
  width:280px;
  height:280px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(139,92,246,0.12),transparent 70%);
  top:-100px;
  left:-100px;
  filter:blur(50px);
  animation:floatGlow 10s ease-in-out infinite;
  z-index:-1;
}
@keyframes floatGlow{0%,100%{transform:translate(0,0);}50%{transform:translate(60px,40px);}}

.chat-header{
  height:78px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  border-bottom:1px solid rgba(168,85,247,.15);
  background:rgba(5,8,22,.88);
  backdrop-filter:blur(22px);
}

.back-btn{
  width:42px;
  height:42px;
  border-radius:14px;
  background:rgba(168,85,247,.14);
  border:1px solid rgba(168,85,247,.28);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  cursor:pointer;
  transition:all 0.3s ease;
}
.back-btn:hover{transform:scale(1.05);}

.chat-user{
  display:flex;
  align-items:center;
  gap:12px;
}

.avatar{
  width:52px;
  height:52px;
  border-radius:18px;
  background:linear-gradient(135deg,#7c3aed,#38bdf8);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  font-weight:900;
  position:relative;
}
.online{
  width:12px;
  height:12px;
  border-radius:50%;
  background:#00f5a0;
  position:absolute;
  right:-2px;
  bottom:-2px;
  box-shadow:0 0 12px #00f5a0;
  animation:pulse 1.5s infinite;
}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}

.user-info strong{display:block;font-size:18px;}
.user-info p{color:#00f5a0;font-size:13px;margin-top:4px;}

.top-icons{display:flex;gap:10px;}
.top-icon{
  width:42px;
  height:42px;
  border-radius:14px;
  background:rgba(168,85,247,.14);
  border:1px solid rgba(168,85,247,.28);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  cursor:pointer;
  transition:all 0.3s ease;
}
.top-icon:hover{transform:scale(1.05);}

.chat-body{
  height:calc(100vh - 158px);
  overflow-y:auto;
  padding:18px 14px 20px;
}

.message{
  display:flex;
  margin-bottom:18px;
  animation:fadeInUp 0.3s ease;
}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

.message.user{justify-content:flex-end;}
.message.support{justify-content:flex-start;}

.bubble{
  max-width:78%;
  padding:14px 16px;
  border-radius:22px;
  line-height:1.6;
  font-size:15px;
  word-break:break-word;
}
.support .bubble{
  background:linear-gradient(145deg,rgba(15,23,55,.96),rgba(5,10,28,.96));
  border:1px solid rgba(168,85,247,.18);
}
.user .bubble{
  background:linear-gradient(135deg,#7c3aed,#9333ea);
}

.chat-img{
  max-width:220px;
  border-radius:14px;
  display:block;
  margin-top:6px;
}
.time{margin-top:8px;font-size:11px;opacity:.65;}

.chat-input{
  position:fixed;
  bottom:0;
  width:100%;
  max-width:430px;
  height:80px;
  background:rgba(5,8,22,.94);
  border-top:1px solid rgba(168,85,247,.15);
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 14px;
  backdrop-filter:blur(22px);
}

.input-box{
  flex:1;
  height:52px;
  border-radius:18px;
  background:linear-gradient(145deg,rgba(15,23,55,.96),rgba(5,10,28,.96));
  border:1px solid rgba(168,85,247,.18);
  padding:0 16px;
  color:white;
  font-size:15px;
  outline:none;
}
.input-box:focus{border-color:#c084fc;}

.photo-btn,.send-btn{
  width:52px;
  height:52px;
  border:none;
  border-radius:18px;
  color:white;
  font-size:20px;
  cursor:pointer;
  transition:all 0.3s ease;
}
.photo-btn{
  background:rgba(168,85,247,.20);
  border:1px solid rgba(168,85,247,.30);
}
.send-btn{
  background:linear-gradient(135deg,#7c3aed,#38bdf8);
}
.photo-btn:hover,.send-btn:hover{transform:scale(1.05);}

.typing-indicator{
  display:flex;
  align-items:center;
  gap:4px;
  padding:12px 16px;
  background:rgba(139,92,246,.1);
  border-radius:20px;
  width:fit-content;
  margin-bottom:12px;
}
.typing-dot{
  width:8px;
  height:8px;
  background:#c084fc;
  border-radius:50%;
  animation:typing 1.4s infinite;
}
.typing-dot:nth-child(2){animation-delay:0.2s;}
.typing-dot:nth-child(3){animation-delay:0.4s;}
@keyframes typing{0%,60%,100%{transform:translateY(0);opacity:0.5;}30%{transform:translateY(-8px);opacity:1;}}
</style>
</head>
<body>

<div class="glow-ball"></div>

<div class="chat-header">
  <div class="back-btn" onclick="window.history.back()">‹</div>
  <div class="chat-user">
    <div class="avatar">AI<div class="online"></div></div>
    <div class="user-info">
      <strong>AI Support</strong>
      <p id="supportStatus">Connecting...</p>
    </div>
  </div>
  <div class="top-icons">
    <div class="top-icon">☎</div>
    <div class="top-icon">⋯</div>
  </div>
</div>

<div class="chat-body" id="chatBody"></div>

<div class="chat-input">
  <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="sendImage()">
  <button class="photo-btn" onclick="document.getElementById('imageInput').click()">📷</button>
  <input type="text" class="input-box" id="messageInput" placeholder="Type your message..." onkeydown="handleEnter(event)">
  <button class="send-btn" onclick="sendMessage()">↑</button>
</div>

<script>
// ==================== 配置 ====================
const API_BASE_URL = "https://ai-trading-system-j5jf.onrender.com";

// Socket.IO 连接（带错误处理）
const socket = io(API_BASE_URL, {
    transports: ['websocket', 'polling'],
    reconnection: true,
    reconnectionAttempts: 5,
    reconnectionDelay: 1000,
    timeout: 10000
});

// ==================== 获取用户信息 ====================
function getCurrentUser(){
  try{
    const user = localStorage.getItem("user");
    return user ? JSON.parse(user) : {};
  }catch(e){ return {}; }
}

const localUser = getCurrentUser();
const chatUserId = localUser.id || localUser._id || "guest-" + Date.now();
const chatUsername = localUser.name || localUser.username || "Guest User";
const chatUid = localUser.uid || "0000";
const serviceId = "CS-001";

const chatBody = document.getElementById("chatBody");
const input = document.getElementById("messageInput");

// ==================== 本地存储消息记录 ====================
let chatRecords = JSON.parse(localStorage.getItem("supportChatRecords_" + chatUserId) || "[]");
let isTyping = false;

function saveChatRecords(){
  localStorage.setItem("supportChatRecords_" + chatUserId, JSON.stringify(chatRecords));
}

function nowTime(){
  return new Date().toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });
}

// ==================== 渲染消息 ====================
function renderMessages(){
  chatBody.innerHTML = "";
  
  if(chatRecords.length === 0){
    chatRecords.push({
      user: chatUserId,
      sender: "service",
      serviceId: serviceId,
      type: "text",
      message: "Welcome to AI Support Center. How can we help you today?",
      time: nowTime()
    });
    saveChatRecords();
  }
  
  chatRecords.forEach(data => {
    const div = document.createElement("div");
    div.className = data.sender === "service" ? "message support" : "message user";
    
    let content = "";
    if(data.type === "image" && data.imageUrl){
      const imgUrl = data.imageUrl.startsWith("http") ? data.imageUrl : API_BASE_URL + data.imageUrl;
      content = `<img class="chat-img" src="${imgUrl}">`;
    } else {
      content = escapeHTML(data.message || "");
    }
    
    div.innerHTML = `<div class="bubble">${content}<div class="time">${data.time || nowTime()}</div></div>`;
    chatBody.appendChild(div);
  });
  
  chatBody.scrollTop = chatBody.scrollHeight;
}

// ==================== XSS防护 ====================
function escapeHTML(str){
  if(!str) return "";
  return String(str).replace(/[&<>]/g, function(m){
    if(m === '&') return '&amp;';
    if(m === '<') return '&lt;';
    if(m === '>') return '&gt;';
    return m;
  });
}

// ==================== 发送消息 ====================
function sendMessage(){
  const text = input.value.trim();
  if(text === "") return;
  
  socket.emit("send_message", {
    user: chatUserId,
    username: chatUsername,
    uid: chatUid,
    serviceId: serviceId,
    sender: "user",
    type: "text",
    message: text,
    time: nowTime()
  });
  
  input.value = "";
}

// ==================== 发送图片 ====================
async function sendImage(){
  const file = document.getElementById("imageInput").files[0];
  if(!file) return;
  
  if(file.size > 5 * 1024 * 1024){
    alert("Image size should be less than 5MB");
    return;
  }
  if(!file.type.startsWith('image/')){
    alert("Only image files are allowed");
    return;
  }
  
  const formData = new FormData();
  formData.append("image", file);
  
  try{
    const res = await fetch(`${API_BASE_URL}/api/chat/upload`, {
      method: "POST",
      body: formData
    });
    const result = await res.json();
    
    if(result.success){
      socket.emit("send_message", {
        user: chatUserId,
        username: chatUsername,
        uid: chatUid,
        serviceId: serviceId,
        sender: "user",
        type: "image",
        imageUrl: result.url.startsWith("http") ? result.url : API_BASE_URL + result.url,
        message: "[image]",
        time: nowTime()
      });
      document.getElementById("imageInput").value = "";
    } else {
      alert("Image upload failed");
    }
  }catch(err){
    console.log(err);
    alert("Image upload failed");
  }
}

function handleEnter(event){
  if(event.key === "Enter"){
    sendMessage();
  }
}

// ==================== Socket事件 ====================
socket.on("connect", () => {
  console.log("✅ Socket连接成功, id:", socket.id);
  document.getElementById("supportStatus").innerHTML = "Online";
  document.getElementById("supportStatus").style.color = "#00f5a0";
});

socket.on("connect_error", (err) => {
  console.log("❌ Socket连接错误:", err.message);
  document.getElementById("supportStatus").innerHTML = "Connection failed";
  document.getElementById("supportStatus").style.color = "#ff4d6d";
});

socket.on("disconnect", () => {
  console.log("⚠️ Socket断开");
  document.getElementById("supportStatus").innerHTML = "Disconnected";
});

socket.on("receive_message", (data) => {
  console.log("收到消息:", data);
  if(String(data.user) !== String(chatUserId)) return;
  
  showTypingIndicator(false);
  
  chatRecords.push({
    user: data.user,
    username: data.username,
    uid: data.uid,
    serviceId: data.serviceId || serviceId,
    sender: data.sender,
    type: data.type || "text",
    message: data.message || "",
    imageUrl: data.imageUrl || "",
    time: data.time || nowTime()
  });
  
  saveChatRecords();
  renderMessages();
});

socket.on("user_typing", (data) => {
  if(data.user === chatUserId) return;
  showTypingIndicator(data.typing);
});

socket.on("service_status", (data) => {
  const statusEl = document.getElementById("supportStatus");
  if(data.serviceOnline){
    statusEl.innerHTML = "Human Support Online";
    statusEl.style.color = "#00f5a0";
  } else if(data.aiSupportEnabled){
    statusEl.innerHTML = "AI Support Online";
    statusEl.style.color = "#c084fc";
  } else {
    statusEl.innerHTML = "Online";
  }
});

function showTypingIndicator(show){
  if(show && !isTyping){
    isTyping = true;
    const indicator = document.createElement('div');
    indicator.id = 'typingIndicator';
    indicator.className = 'message support';
    indicator.innerHTML = `<div class="bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
    chatBody.appendChild(indicator);
    chatBody.scrollTop = chatBody.scrollHeight;
  } else if(!show && isTyping){
    isTyping = false;
    const indicator = document.getElementById('typingIndicator');
    if(indicator) indicator.remove();
  }
}

// 输入框输入事件
let typingTimeout;
input.addEventListener("input", () => {
  socket.emit("user_typing", { user: chatUserId, typing: true });
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    socket.emit("user_typing", { user: chatUserId, typing: false });
  }, 1000);
});

// ==================== 初始化 ====================
renderMessages();
</script>
</body>
</html>
