<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Support</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
  background:
    radial-gradient(circle at top left,rgba(168,85,247,.24),transparent 30%),
    radial-gradient(circle at bottom right,rgba(56,189,248,.14),transparent 30%),
    linear-gradient(180deg,#040612,#050816,#02030a);
  color:white;
  max-width:430px;
  min-height:100vh;
  margin:0 auto;
  overflow:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:radial-gradient(circle,rgba(255,255,255,.12) 1px,transparent 1px);
  background-size:38px 38px;
  opacity:.14;
  pointer-events:none;
}

.chat-header{
  height:78px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  border-bottom:1px solid rgba(168,85,247,.15);
  background:rgba(5,8,22,.88);
  backdrop-filter:blur(22px);
}

.back-btn{
  width:42px;
  height:42px;
  border-radius:14px;
  background:rgba(168,85,247,.14);
  border:1px solid rgba(168,85,247,.28);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  box-shadow:0 0 18px rgba(168,85,247,.25);
  cursor:pointer;
}

.chat-user{
  display:flex;
  align-items:center;
  gap:12px;
}

.avatar{
  width:52px;
  height:52px;
  border-radius:18px;
  background:linear-gradient(135deg,#7c3aed,#38bdf8);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  font-weight:900;
  box-shadow:0 0 22px rgba(168,85,247,.28);
  position:relative;
}

.online{
  width:12px;
  height:12px;
  border-radius:50%;
  background:#00f5a0;
  position:absolute;
  right:-2px;
  bottom:-2px;
  box-shadow:0 0 12px #00f5a0;
}

.user-info strong{
  display:block;
  font-size:18px;
}

.user-info p{
  color:#00f5a0;
  font-size:13px;
  margin-top:4px;
}

.top-icons{
  display:flex;
  gap:10px;
}

.top-icon{
  width:42px;
  height:42px;
  border-radius:14px;
  background:rgba(168,85,247,.14);
  border:1px solid rgba(168,85,247,.28);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}

.chat-body{
  height:calc(100vh - 158px);
  overflow-y:auto;
  padding:18px 14px 20px;
}

.message{
  display:flex;
  margin-bottom:18px;
}

.message.user{
  justify-content:flex-end;
}

.message.support{
  justify-content:flex-start;
}

.bubble{
  max-width:78%;
  padding:14px 16px;
  border-radius:22px;
  line-height:1.6;
  font-size:15px;
  position:relative;
  word-break:break-word;
}

.support .bubble{
  background:linear-gradient(145deg,rgba(15,23,55,.96),rgba(5,10,28,.96));
  border:1px solid rgba(168,85,247,.18);
  box-shadow:0 0 22px rgba(168,85,247,.12);
}

.user .bubble{
  background:linear-gradient(135deg,#7c3aed,#9333ea);
  box-shadow:0 0 22px rgba(168,85,247,.22);
}

.chat-img{
  max-width:220px;
  max-height:260px;
  border-radius:16px;
  display:block;
}

.chat-img{
  max-width:220px;
  border-radius:14px;
  display:block;
  margin-top:6px;
}

.time{
  margin-top:8px;
  font-size:11px;
  opacity:.65;
}

.chat-input{
  position:fixed;
  bottom:0;
  width:100%;
  max-width:430px;
  height:80px;
  background:rgba(5,8,22,.94);
  border-top:1px solid rgba(168,85,247,.15);
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 14px;
  backdrop-filter:blur(22px);
}

.input-box{
  flex:1;
  height:52px;
  border-radius:18px;
  background:linear-gradient(145deg,rgba(15,23,55,.96),rgba(5,10,28,.96));
  border:1px solid rgba(168,85,247,.18);
  padding:0 16px;
  color:white;
  font-size:15px;
  outline:none;
}

.photo-btn,
.send-btn{
  width:52px;
  height:52px;
  border:none;
  border-radius:18px;
  color:white;
  font-size:20px;
  font-weight:900;
  cursor:pointer;
}

.photo-btn{
  background:rgba(168,85,247,.20);
  border:1px solid rgba(168,85,247,.30);
}

.send-btn{
  background:linear-gradient(135deg,#7c3aed,#38bdf8);
  box-shadow:0 0 22px rgba(168,85,247,.28);
}
</style>
</head>

<body>

<div class="chat-header">

  <div class="back-btn" onclick="window.history.back()">‹</div>

  <div class="chat-user">
    <div class="avatar">
      AI
      <div class="online"></div>
    </div>

    <div class="user-info">
      <strong>AI Support</strong>
      <p id="supportStatus">Online</p>
    </div>
  </div>

  <div class="top-icons">
    <div class="top-icon">☎</div>
    <div class="top-icon">⋯</div>
  </div>

</div>

<div class="chat-body" id="chatBody"></div>

<div class="chat-input">

  <input
    type="file"
    id="imageInput"
    accept="image/*"
    style="display:none"
    onchange="sendImage()"
  >

  <button class="photo-btn" onclick="document.getElementById('imageInput').click()">
    📷
  </button>

  <input
    type="text"
    class="input-box"
    id="messageInput"
    placeholder="Type your message..."
    onkeydown="handleEnter(event)"
  >

  <button class="send-btn" onclick="sendMessage()">↑</button>

</div>

<script>
const socket =
io("https://ai-trading-system-j5jf.onrender.com");

const localUser =
  JSON.parse(localStorage.getItem("user")) || {};

const chatUserId =
  localUser.id || localUser._id || localUser.uid || "guest-" + Date.now();

const chatUsername =
  localUser.name || localUser.username || "Guest User";

const chatUid =
  localUser.uid || "0000";

const serviceId = "CS-001";

const chatBody =
  document.getElementById("chatBody");

const input =
  document.getElementById("messageInput");

let chatRecords =
  JSON.parse(localStorage.getItem("supportChatRecords_" + chatUserId) || "[]");

function saveChatRecords(){
  localStorage.setItem(
    "supportChatRecords_" + chatUserId,
    JSON.stringify(chatRecords)
  );
}

function nowTime(){
  return new Date().toLocaleTimeString([], {
    hour:"2-digit",
    minute:"2-digit"
  });
}

function renderMessages(){

  chatBody.innerHTML = "";

  if(chatRecords.length === 0){

    chatRecords.push({
      user: chatUserId,
      sender: "service",
      serviceId,
      type: "text",
      message: "Welcome to AI Support Center. How can we help you today?",
      time: nowTime()
    });

    saveChatRecords();
  }

  chatRecords.forEach(data => {

    const div = document.createElement("div");

    div.className =
      data.sender === "service"
      ? "message support"
      : "message user";

   const content =
        data.type === "image"
      ? `<img
        class="chat-img"
        src="${
          data.imageUrl.startsWith("http")
  ? data.imageUrl
  : "https://www.quantai.fyi" + data.imageUrl
        }"
     >`
    : escapeHTML(data.message || "");

    div.innerHTML = `
      <div class="bubble">
        ${content}
        <div class="time">${data.time || nowTime()}</div>
      </div>
    `;

    chatBody.appendChild(div);
  });

  chatBody.scrollTop = chatBody.scrollHeight;
}

function escapeHTML(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function sendMessage(){

  const text = input.value.trim();

  if(text === "") return;

  socket.emit("send_message", {
    user: chatUserId,
    username: chatUsername,
    uid: chatUid,
    serviceId,
    sender: "user",
    type: "text",
    message: text,
    time: nowTime()
  });

  input.value = "";
}

async function sendImage(){

  const file =
    document.getElementById("imageInput").files[0];

  if(!file) return;

  const formData = new FormData();
  formData.append("image", file);

  try{

 const res = await fetch(
  "https://ai-trading-system-j5jf.onrender.com/api/chat/upload",
  {
    method: "POST",
    body: formData
  }
);

    const result = await res.json();

    if(result.success){

      socket.emit("send_message", {
        user: chatUserId,
        username: chatUsername,
        uid: chatUid,
        serviceId,
        sender: "user",
        type: "image",
        imageUrl: result.url,
        message: "[image]",
        time: nowTime()
      });

      document.getElementById("imageInput").value = "";

    }else{
      alert("Image upload failed");
    }

  }catch(err){

    alert("Image upload failed");
  }
}

function handleEnter(event){

  if(event.key === "Enter"){
    sendMessage();
  }
}

socket.on("connect", () => {
  console.log("User chat connected:", chatUserId);
});

socket.on("receive_message", (data)=>{

console.log("收到消息数据:", data);

  if(String(data.user) !== String(chatUserId)){
    return;
  }

  chatRecords.push({
    user: data.user,
    username: data.username,
    uid: data.uid,
    serviceId: data.serviceId || serviceId,
    sender: data.sender,
    type: data.type || "text",
    message: data.message || "",
    imageUrl: data.imageUrl || "",
    time: data.time || nowTime()
  });

  saveChatRecords();
  renderMessages();
});

socket.on("service_status", (data)=>{

  const status =
    document.getElementById("supportStatus");

  if(data.serviceOnline){
    status.innerText = "Human Support Online";
  }else if(data.aiSupportEnabled){
    status.innerText = "AI Support Online";
  }else{
    status.innerText = "Online";
  }
});

renderMessages();
</script>

</body>
</html>
