<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>KYC 审核后台</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,"Microsoft YaHei",sans-serif;}

body{
  background:#070707;
  color:#fff;
  display:flex;
  min-height:100vh;
}

.sidebar{
  width:250px;
  background:#191919;
  padding:28px 20px;
}

.logo{
  font-size:26px;
  font-weight:900;
  color:#7c3aed;
  margin-bottom:50px;
}

.nav a{
  display:block;
  color:white;
  text-decoration:none;
  padding:16px 0;
  font-size:18px;
  font-weight:700;
  transition:all 0.3s;
}

.nav a:hover{
  color:#8b5cf6;
  padding-left:5px;
}

.nav a.active{
  color:#8b5cf6;
}

.main{
  flex:1;
  padding:45px 34px;
  overflow-x:auto;
}

h1{
  font-size:54px;
  color:#7c3aed;
  margin-bottom:32px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:22px;
  margin-bottom:28px;
}

.stat-card{
  background:#181818;
  border:1px solid #333;
  border-radius:14px;
  padding:26px;
  transition:all 0.3s;
}

.stat-card:hover{
  transform:translateY(-3px);
  border-color:#7c3aed;
}

.stat-card span{
  color:#bbb;
  font-size:16px;
}

.stat-card strong{
  display:block;
  color:#7c3aed;
  font-size:32px;
  margin-top:14px;
}

.search{
  width:460px;
  height:48px;
  border:none;
  outline:none;
  border-radius:6px;
  background:#222;
  color:white;
  padding:0 16px;
  font-size:16px;
  margin-bottom:22px;
}

.search:focus{
  border:1px solid #7c3aed;
}

.table-wrapper{
  overflow-x:auto;
  border-radius:12px;
  border:1px solid #333;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#111;
  min-width:800px;
}

th,td{
  border:1px solid #333;
  padding:16px;
  text-align:center;
  font-size:15px;
}

th{
  background:#202020;
  font-weight:bold;
}

tr:hover{
  background:#1a1a1a;
}

.status-pending{
  color:#ffc107;
  font-weight:800;
}
.status-approved{
  color:#00ff88;
  font-weight:800;
}
.status-rejected{
  color:#ff4d6d;
  font-weight:800;
}

.view-btn,.approve-btn,.reject-btn{
  border:none;
  border-radius:8px;
  padding:8px 12px;
  color:white;
  cursor:pointer;
  margin:2px;
  font-weight:700;
  transition:all 0.3s;
}
.view-btn{background:#2563eb;}
.approve-btn{background:#00b894;}
.reject-btn{background:#e11d48;}
.view-btn:hover{background:#1e4fd0;}
.approve-btn:hover{background:#00a07a;}
.reject-btn:hover{background:#c0103a;}

.empty{
  text-align:center;
  color:#888;
  padding:40px;
}

.loading{
  text-align:center;
  color:#c084fc;
  padding:40px;
}

.global-toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(10,20,40,0.95);
  border:1px solid #c084fc;
  color:#c084fc;
  padding:12px 24px;
  border-radius:50px;
  font-size:14px;
  z-index:10000;
  backdrop-filter:blur(10px);
}

@media(max-width:900px){
  .sidebar{display:none;}
  .main{padding:24px 14px;}
  h1{font-size:38px;}
  .stats{grid-template-columns:1fr 1fr;gap:12px;}
  .stat-card{padding:18px;}
  .stat-card strong{font-size:24px;}
  .search{width:100%;}
}
</style>
</head>

<script>
const adminAuth = JSON.parse(localStorage.getItem("adminAuth") || "null");

if (!adminAuth || adminAuth.role !== "admin") {
  alert("Please login as admin");
  window.location.href = "admin_login.html";
}
</script>

<body>

<div class="sidebar">
  <div class="logo">人工智能贸易</div>

  <div class="nav">
    <a href="dashboard.html">仪表板</a>
    <a href="trade_management.html">交易管理</a>
    <a href="user_management.html">用户管理</a>
    <a href="kyc.html" class="active">KYC审核</a>
    <a href="order_management.html">订单管理</a>
    <a href="withdraw_management.html">提现管理</a>
    <a href="customer_service.html">客服管理</a>
  </div>
</div>

<div class="main">

  <h1>KYC 审核</h1>

  <div class="stats">
    <div class="stat-card"><span>总申请</span><strong id="totalCount">0</strong></div>
    <div class="stat-card"><span>待审核</span><strong id="pendingCount">0</strong></div>
    <div class="stat-card"><span>已通过</span><strong id="approvedCount">0</strong></div>
    <div class="stat-card"><span>已驳回</span><strong id="rejectedCount">0</strong></div>
  </div>

  <input class="search" id="searchInput" placeholder="搜索姓名 / 邮箱 / UID / 状态" oninput="searchKYC()">

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>UID</th>
          <th>姓名</th>
          <th>邮箱</th>
          <th>提交时间</th>
          <th>状态</th>
          <th>身份证正面</th>
          <th>地址证明</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="kycTable">
        <tr><td colspan="8" class="loading">正在加载 KYC 数据...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
// ==================== 配置 ====================
const API_BASE = "https://ai-trading-system-j5jf.onrender.com";
const ADMIN_TOKEN = "AI_ADMIN_2026";

let kycData = [];

// ==================== 获取状态样式 ====================
function getStatusClass(status) {
    if (status === "已通过" || status === "Approved") return "status-approved";
    if (status === "已驳回" || status === "Rejected") return "status-rejected";
    return "status-pending";
}

function getStatusText(status) {
    if (status === "Approved" || status === "已通过") return "已通过";
    if (status === "Rejected" || status === "已驳回") return "已驳回";
    return "待审核";
}

// ==================== 加载KYC数据 ====================
async function loadKYC() {
    const tbody = document.getElementById("kycTable");
    tbody.innerHTML = '<tr><td colspan="8" class="loading">加载中...</td></tr>';
    
    try {
        const response = await fetch(`${API_BASE}/api/kyc`, {
            headers: { "admin-token": ADMIN_TOKEN }
        });
        const result = await response.json();
        
        if (result.success && result.data) {
            kycData = result.data;
            renderTable(kycData);
            updateStats();
        } else {
            tbody.innerHTML = '<tr><td colspan="8" class="empty">暂无KYC申请</td></tr>';
        }
    } catch (error) {
        console.error("Load KYC error:", error);
        tbody.innerHTML = '<tr><td colspan="8" class="empty">加载失败，请检查网络</td></tr>';
    }
}

// ==================== 渲染表格 ====================
function renderTable(data) {
    const table = document.getElementById("kycTable");
    
    if (!data || data.length === 0) {
        table.innerHTML = '<tr><td colspan="8" class="empty">暂无KYC申请</td></tr>';
        return;
    }
    
    table.innerHTML = "";
    
    data.forEach(item => {
        const statusClass = getStatusClass(item.status);
        const statusText = getStatusText(item.status);
        const createdAt = item.createdAt ? new Date(item.createdAt).toLocaleString() : "-";
        
        // 构建图片查看链接（修复：正确拼接图片URL）
        let frontImageHtml = "-";
        let backImageHtml = "-";
        
        if (item.frontImage) {
            const imgUrl = item.frontImage.startsWith("http") ? item.frontImage : API_BASE + item.frontImage;
            frontImageHtml = `<a href="${imgUrl}" target="_blank" class="view-btn" style="background:#2563eb;text-decoration:none;display:inline-block;">查看</a>`;
        }
        if (item.backImage) {
            const imgUrl = item.backImage.startsWith("http") ? item.backImage : API_BASE + item.backImage;
            backImageHtml = `<a href="${imgUrl}" target="_blank" class="view-btn" style="background:#2563eb;text-decoration:none;display:inline-block;">查看</a>`;
        }
        
        // 操作按钮（只有待审核状态才显示）
        let actionButtons = "";
        if (item.status === "未审核" || item.status === "Pending") {
            actionButtons = `
                <button class="approve-btn" onclick="approveKYC('${item._id}')">通过</button>
                <button class="reject-btn" onclick="rejectKYC('${item._id}')">驳回</button>
            `;
        } else {
            actionButtons = '<span style="color:#666;">已处理</span>';
        }
        
        const row = document.createElement("tr");
        row.innerHTML = `
            <td>${item.uid || "-"}</td>
            <td>${escapeHtml(item.name || "-")}</td>
            <td>${escapeHtml(item.email || "-")}</td>
            <td>${createdAt}</td>
            <td class="${statusClass}">${statusText}</td>
            <td>${frontImageHtml}</td>
            <td>${backImageHtml}</td>
            <td>${actionButtons}</td>
        `;
        table.appendChild(row);
    });
}

// ==================== 更新统计 ====================
function updateStats() {
    const total = kycData.length;
    const pending = kycData.filter(x => x.status === "未审核" || x.status === "Pending").length;
    const approved = kycData.filter(x => x.status === "已通过" || x.status === "Approved").length;
    const rejected = kycData.filter(x => x.status === "已驳回" || x.status === "Rejected").length;
    
    document.getElementById("totalCount").innerText = total;
    document.getElementById("pendingCount").innerText = pending;
    document.getElementById("approvedCount").innerText = approved;
    document.getElementById("rejectedCount").innerText = rejected;
}

// ==================== 通过KYC ====================
async function approveKYC(id) {
    if (!confirm("确定要通过该用户的KYC申请吗？")) return;
    
    try {
        const response = await fetch(`${API_BASE}/api/kyc/${id}/approve`, {
            method: "PUT",
            headers: { "admin-token": ADMIN_TOKEN }
        });
        const result = await response.json();
        
        if (result.success) {
            showToast("KYC已通过", "success");
            loadKYC();
        } else {
            showToast(result.message || "操作失败", "error");
        }
    } catch (error) {
        console.error("Approve KYC error:", error);
        showToast("网络错误，请重试", "error");
    }
}

// ==================== 驳回KYC ====================
async function rejectKYC(id) {
    if (!confirm("确定要驳回该用户的KYC申请吗？")) return;
    
    try {
        const response = await fetch(`${API_BASE}/api/kyc/${id}/reject`, {
            method: "PUT",
            headers: { "admin-token": ADMIN_TOKEN }
        });
        const result = await response.json();
        
        if (result.success) {
            showToast("KYC已驳回", "success");
            loadKYC();
        } else {
            showToast(result.message || "操作失败", "error");
        }
    } catch (error) {
        console.error("Reject KYC error:", error);
        showToast("网络错误，请重试", "error");
    }
}

// ==================== 搜索过滤 ====================
function searchKYC() {
    const keyword = document.getElementById("searchInput").value.toLowerCase();
    
    if (!keyword) {
        renderTable(kycData);
        return;
    }
    
    const filtered = kycData.filter(item => {
        const name = (item.name || "").toLowerCase();
        const email = (item.email || "").toLowerCase();
        const uid = (item.uid || "").toString();
        const status = (item.status || "").toLowerCase();
        
        return name.includes(keyword) || email.includes(keyword) || uid.includes(keyword) || status.includes(keyword);
    });
    
    renderTable(filtered);
}

// ==================== XSS防护 ====================
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// ==================== 显示提示 ====================
function showToast(message, type = "info") {
    const existingToast = document.querySelector(".global-toast");
    if (existingToast) existingToast.remove();
    
    const toast = document.createElement("div");
    toast.className = "global-toast";
    toast.textContent = message;
    
    const colors = { success: "#00f5a0", error: "#ff4d6d", info: "#c084fc" };
    toast.style.borderColor = colors[type] || colors.info;
    toast.style.color = colors[type] || colors.info;
    
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
}

// ==================== 页面启动 ====================
loadKYC();
</script>

</body>
</html>
