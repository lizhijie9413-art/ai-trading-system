<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>客服聊天系统</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0b0b0f;color:white;font-family:Arial, sans-serif;
  height:100vh;overflow:hidden;
}
.container{display:flex;height:100vh}

/* 左侧 */
.sidebar{
  width:330px;background:#17171c;border-right:1px solid #2a2a2a;
  display:flex;flex-direction:column;
}
.sidebar-header{
  padding:22px;font-size:30px;font-weight:900;color:#7c3aed;
  border-bottom:1px solid #2a2a2a;
}
.sidebar-tools{
  padding:14px;border-bottom:1px solid #2a2a2a;
}
.sidebar-tools input{
  width:100%;height:42px;border:none;outline:none;border-radius:10px;
  background:#24242b;color:white;padding:0 14px;font-size:15px;
}
.user-list{overflow-y:auto;flex:1}
.user-item{
  padding:18px 20px;border-bottom:1px solid #2a2a2a;cursor:pointer;
  transition:.25s;position:relative;
}
.user-item:hover{background:#24242b}
.user-item.active{background:#2d2d35;border-left:4px solid #7c3aed}
.user-name{font-size:20px;font-weight:900}
.user-meta{margin-top:6px;color:#aaa;font-size:13px}
.user-status{margin-top:6px;font-size:14px}.user-status.online{color:#00ff88}.user-status.offline{color:#94a3b8}
.unread{
  position:absolute;right:18px;top:22px;min-width:22px;height:22px;
  padding:0 7px;border-radius:20px;background:#ff1744;color:white;
  display:none;align-items:center;justify-content:center;font-size:12px;
}

/* 右侧 */
.chat-area{flex:1;display:flex;flex-direction:column;background:#08080d}
.chat-header{
  min-height:92px;background:#17171c;border-bottom:1px solid #2a2a2a;
  display:flex;align-items:center;justify-content:space-between;padding:0 26px;gap:18px;
}
.chat-title{font-size:34px;color:#7c3aed;font-weight:900}
.chat-subtitle{font-size:14px;color:#aaa;margin-top:4px}
.control-buttons{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.control-buttons button{
  border:none;padding:11px 16px;border-radius:10px;font-size:15px;
  cursor:pointer;font-weight:800;background:#2a2a2a;color:white;
}
.control-buttons button.active{background:#7c3aed;color:white}
.control-buttons .danger{background:#ff1744}
.control-buttons .green{background:#00c853}
.control-buttons .blue{background:#2979ff}

.chat-body{flex:1;overflow-y:auto;padding:28px}
.message{display:flex;margin-bottom:18px}
.message.user{justify-content:flex-start}
.message.service{justify-content:flex-end}
.bubble{
  max-width:62%;padding:14px 16px;border-radius:16px;font-size:17px;line-height:1.55;
  word-break:break-word;
}
.message.user .bubble{background:#20202a;border:1px solid #333}
.message.service .bubble{background:#7c3aed}
.msg-time{font-size:12px;color:#bbb;margin-top:8px}
.chat-img{
  max-width:280px;max-height:260px;border-radius:12px;display:block;margin-top:6px;
  border:1px solid rgba(255,255,255,.15);
}

.chat-input{
  min-height:96px;border-top:1px solid #2a2a2a;display:flex;align-items:center;
  padding:18px;gap:14px;background:#111116;
}
.chat-input input[type="text"]{
  flex:1;height:58px;border:none;outline:none;border-radius:14px;
  background:#1f1f25;color:white;padding:0 18px;font-size:17px;
}
.chat-input button,.upload-btn{
  height:58px;border:none;border-radius:14px;background:#7c3aed;color:white;
  font-size:17px;font-weight:900;cursor:pointer;padding:0 22px;
}
.upload-btn{display:flex;align-items:center}
#imageInput{display:none}
.status-bar{
  padding:8px 18px;background:#101014;border-top:1px solid #222;
  color:#aaa;font-size:13px;
}
</style>
</head>

<script>
const adminAuth = JSON.parse(localStorage.getItem("adminAuth") || "null");

if (!adminAuth || adminAuth.role !== "admin") {
  alert("Please login as admin");
  window.location.href = "admin_login.html";
}
</script>

<body>
<div class="container">

  <div class="sidebar">
    <div class="sidebar-header">用户会话</div>

    <div class="sidebar-tools">
      <input id="searchInput" placeholder="搜索用户名 / UID / 邮箱" oninput="renderUsers()">
    </div>

    <div class="user-list" id="userList"></div>
  </div>

  <div class="chat-area">

    <div class="chat-header">
      <div>
        <div class="chat-title" id="chatTitle">请选择用户</div>
        <div class="chat-subtitle" id="chatSubtitle">客服ID: CS-001</div>
      </div>

      <div class="control-buttons">
        <button id="onlineBtn" class="green" onclick="setServiceOnline()">人工上线</button>
        <button id="offlineBtn" onclick="setServiceOffline()">人工离线</button>
        <button id="aiOnBtn" class="blue" onclick="enableAI()">AI托管开</button>
        <button id="aiOffBtn" class="danger" onclick="disableAI()">AI托管关</button>
      </div>
    </div>

    <div class="chat-body" id="chatBody"></div>

    <div class="status-bar" id="statusBar">
      状态：人工客服未上线，AI托管默认开启
    </div>

    <div class="chat-input">
      <label class="upload-btn" for="imageInput">📷 照片</label>
      <input type="file" id="imageInput" accept="image/*" onchange="sendImage()">

      <input
        type="text"
        id="messageInput"
        placeholder="输入客服回复..."
        onkeydown="handleEnter(event)"
      />

      <button onclick="sendMessage()">发送</button>
    </div>

  </div>
</div>

<script>
// ==================== 配置 ====================
const API_BASE = "https://ai-trading-system-j5jf.onrender.com";
const ADMIN_TOKEN = adminAuth.token;

// Socket.IO 连接（带错误处理）
const socket = io(API_BASE, {
    transports: ['websocket', 'polling'],
    reconnection: true,
    reconnectionAttempts: 5,
    reconnectionDelay: 1000,
    timeout: 10000
});

// ==================== 全局变量 ====================
let users = [];
let currentUserId = "";
let currentUserName = "";
let serviceId = "CS-001";
let serviceOnline = false;
let aiSupportEnabled = true;
let chatRecords = {};
let unreadMap = {};
let onlineUsers = {};
let totalUnread = 0;
const defaultTitle = document.title;

const userList = document.getElementById("userList");
const chatBody = document.getElementById("chatBody");
const input = document.getElementById("messageInput");

function updateTitleNotice(){
    totalUnread = Object.values(unreadMap).reduce((sum, value) => sum + Number(value || 0), 0);
    document.title = totalUnread > 0 ? "(" + totalUnread + ") New customer message" : defaultTitle;
}

function playNewMessageSound(){
    try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();
        oscillator.type = "sine";
        oscillator.frequency.value = 880;
        gain.gain.setValueAtTime(0.001, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.18, ctx.currentTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
        oscillator.connect(gain);
        gain.connect(ctx.destination);
        oscillator.start();
        oscillator.stop(ctx.currentTime + 0.36);
    } catch (err) {
        console.log("Notification sound blocked:", err.message);
    }
}

function notifyNewMessage(data){
    if(data.sender === "service") return;
    playNewMessageSound();
    if ("Notification" in window && Notification.permission === "granted") {
        new Notification("New customer message", {
            body: (data.username || data.uid || "Customer") + ": " + (data.message || "[image]")
        });
    }
}

if ("Notification" in window && Notification.permission === "default") {
    Notification.requestPermission().catch(() => {});
}

// ==================== XSS防护（修复：确保输入是字符串） ====================
function escapeHtml(str) {
    // 修复：如果输入不是字符串，先转换为字符串
    if (str === undefined || str === null) return '';
    const strVal = String(str);
    return strVal.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// ==================== Socket事件 ====================
socket.on("connect", () => {
    console.log("✅ 客服后台已连接, socket id:", socket.id);
    document.getElementById("statusBar").innerHTML = "状态：已连接服务器 ✓";
    setServiceOnline();
    disableAI();
});

socket.on("connect_error", (err) => {
    console.log("❌ Socket连接错误:", err.message);
    document.getElementById("statusBar").innerHTML = "状态：连接失败，请检查网络或VPN ✗";
});

socket.on("disconnect", () => {
    console.log("⚠️ Socket已断开");
    document.getElementById("statusBar").innerHTML = "状态：连接已断开，正在重连...";
});

socket.on("user_status", (data) => {
    if(!data || !data.userId) return;
    onlineUsers[data.userId] = !!data.online;
    renderUsers();
});

socket.on("receive_message", (data) => {
    const userId = data.user;
    if(!chatRecords[userId]) chatRecords[userId] = [];
    chatRecords[userId].push(data);
    if(userId !== currentUserId){
        unreadMap[userId] = (unreadMap[userId] || 0) + 1;
        renderUsers();
        return;
    }
    renderMessages();
});

// ==================== 加载用户列表 ====================
async function loadUsers(){
    try{
        const res = await fetch(`${API_BASE}/api/users`, {
            headers: { "admin-token": ADMIN_TOKEN }
        });
        const result = await res.json();

        users = result.data || [];

        if(users.length > 0 && !currentUserId){
            const first = users[0];
            currentUserId = first._id || first.id;
            currentUserName = first.name || first.username || "Unknown";
            document.getElementById("chatTitle").innerText = `正在与 ${currentUserName} 聊天`;
        }

        renderUsers();
        renderMessages();

    }catch(err){
        console.log(err);
        userList.innerHTML = "<div style='padding:20px;color:#f87171'>用户加载失败</div>";
    }
}

// ==================== 渲染用户列表 ====================
function renderUsers(){
    const keyword = document.getElementById("searchInput").value.toLowerCase();

    const list = users.filter(u => {
        const text = `${u.uid || ""} ${u.name || ""} ${u.username || ""} ${u.email || ""}`.toLowerCase();
        return text.includes(keyword);
    });

    userList.innerHTML = "";

    list.forEach(user => {
        const id = user._id || user.id;
        // 修复：确保转换为字符串
        const name = user.name || user.username || "Unknown";
        const uid = user.uid !== undefined && user.uid !== null ? String(user.uid) : "无UID";
        const email = user.email || "No email";
        const unread = unreadMap[id] || 0;
        const isOnline = !!onlineUsers[id];

        const div = document.createElement("div");
        div.className = "user-item" + (id === currentUserId ? " active" : "");
        div.onclick = () => switchUser(id, name, uid, email);

        div.innerHTML = `
            <div class="user-name">${escapeHtml(name)}</div>
            <div class="user-meta">UID: ${escapeHtml(uid)}</div>
            <div class="user-meta">${escapeHtml(email)}</div>
            <div class="user-status ${isOnline ? 'online' : 'offline'}">${isOnline ? "● 在线" : "○ 离线"}</div>
            <div class="unread" style="display:${unread ? "flex" : "none"}">${unread}</div>
        `;

        userList.appendChild(div);
    });
}

// ==================== 切换用户 ====================
function switchUser(id, name, uid, email){
    currentUserId = id;
    currentUserName = name;
    unreadMap[id] = 0;
    updateTitleNotice();

    document.getElementById("chatTitle").innerText = `正在与 ${escapeHtml(name)} 聊天`;
    document.getElementById("chatSubtitle").innerText = `用户UID: ${escapeHtml(uid)} ｜ 邮箱: ${escapeHtml(email)} ｜ 客服ID: ${serviceId}`;

    renderUsers();
    renderMessages();
}

// ==================== 人工/AI开关 ====================
function setServiceOnline(){
    serviceOnline = true;
    socket.emit("service_online");
    updateStatus();
}

function setServiceOffline(){
    serviceOnline = false;
    socket.emit("service_offline");
    updateStatus();
}

function enableAI(){
    aiSupportEnabled = true;
    socket.emit("set_ai_support", true);
    updateStatus();
}

function disableAI(){
    aiSupportEnabled = false;
    socket.emit("set_ai_support", false);
    updateStatus();
}

function updateStatus(){
    document.getElementById("onlineBtn").classList.toggle("active", serviceOnline);
    document.getElementById("offlineBtn").classList.toggle("active", !serviceOnline);
    document.getElementById("aiOnBtn").classList.toggle("active", aiSupportEnabled);
    document.getElementById("aiOffBtn").classList.toggle("active", !aiSupportEnabled);

    document.getElementById("statusBar").innerText = 
        `状态：${serviceOnline ? "人工客服在线 👤" : "人工客服离线 💤"} ｜ ${aiSupportEnabled ? "AI托管开启 🤖" : "AI托管关闭 🔒"} ｜ 客服ID：${serviceId}`;
}

// ==================== 发送文字 ====================
function sendMessage(){
    const message = input.value.trim();
    if(!currentUserId){
        alert("请先选择用户");
        return;
    }
    if(!message) return;

    socket.emit("send_message", {
        user: currentUserId,
        userName: currentUserName,
        serviceId,
        sender: "service",
        type: "text",
        message: escapeHtml(message)
    });
    input.value = "";
}

function handleEnter(event){
    if(event.key === "Enter"){
        sendMessage();
    }
}

// ==================== 发送图片 ====================
async function sendImage(){
    const file = document.getElementById("imageInput").files[0];
    if(!currentUserId){
        alert("请先选择用户");
        return;
    }
    if(!file) return;

    const formData = new FormData();
    formData.append("image", file);

    try {
        const res = await fetch(`${API_BASE}/api/chat/upload`, {
            method: "POST",
            body: formData
        });
        const result = await res.json();

        if(!result.success){
            alert("图片上传失败");
            return;
        }

        socket.emit("send_message", {
            user: currentUserId,
            userName: currentUserName,
            serviceId,
            sender: "service",
            type: "image",
            imageUrl: result.url.startsWith("http") ? result.url : API_BASE + result.url,
            message: "[图片]"
        });
        document.getElementById("imageInput").value = "";
    } catch(err) {
        console.log(err);
        alert("上传失败");
    }
}

// ==================== 渲染消息 ====================
function renderMessages(){
    chatBody.innerHTML = "";
    if(!currentUserId){
        chatBody.innerHTML = "<div style='color:#aaa'>请选择一个用户会话</div>";
        return;
    }

    const list = chatRecords[currentUserId] || [];
    list.forEach(data => {
        const div = document.createElement("div");
        div.className = data.sender === "service" ? "message service" : "message user";

        let content = "";
        if (data.type === "image" && data.imageUrl) {
            content = `<div>${escapeHtml(data.message || "")}</div><img class="chat-img" src="${data.imageUrl}">`;
        } else {
            content = escapeHtml(data.message || "");
        }

        div.innerHTML = `
            <div class="bubble">
                ${content}
                <div class="msg-time">${escapeHtml(data.time || "Now")} ${data.serviceId ? "｜" + escapeHtml(data.serviceId) : ""}</div>
            </div>
        `;
        chatBody.appendChild(div);
    });
    chatBody.scrollTop = chatBody.scrollHeight;
}

// ==================== 页面启动 ====================
loadUsers();
updateStatus();
</script>

</body>
</html>
