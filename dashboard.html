<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台仪表盘</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif;}
body{background:#08080c;color:white;}

.sidebar{
  width:260px;height:100vh;background:#151515;position:fixed;left:0;top:0;padding-top:25px;
}
.sidebar h2{color:#7c4dff;padding-left:22px;margin-bottom:35px;}
.sidebar a{
  display:block;color:white;text-decoration:none;padding:15px 22px;font-size:17px;font-weight:bold;
}
.sidebar a:hover,.sidebar a.active{background:#252525;color:#7c4dff;}

.main{margin-left:260px;padding:35px;}
h1{font-size:52px;color:#7c4dff;margin-bottom:10px;}
.desc{color:#aaa;margin-bottom:30px;}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  margin-bottom:30px;
}
.card{
  background:#171717;
  border:1px solid #333;
  border-radius:16px;
  padding:22px;
}
.card p{color:#aaa;font-size:15px;}
.card h2{font-size:30px;margin-top:12px;color:#7c4dff;}

.section{
  background:#141414;
  border:1px solid #333;
  border-radius:16px;
  padding:22px;
  margin-top:25px;
}
.section h2{color:#7c4dff;margin-bottom:18px;}

.quick{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:15px;
}
.quick a{
  background:#222;
  color:white;
  text-decoration:none;
  padding:18px;
  border-radius:12px;
  text-align:center;
  font-weight:bold;
}
.quick a:hover{background:#7c4dff;}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}
th,td{
  border:1px solid #333;
  padding:13px;
  text-align:center;
}
th{background:#202020;}
td{color:#ddd;}

.status-running{color:orange;font-weight:bold;}
.status-completed{color:#00ff88;font-weight:bold;}
</style>
</head>

<script>
const adminAuth = JSON.parse(localStorage.getItem("adminAuth") || "null");

if (!adminAuth || adminAuth.role !== "admin") {
  alert("Please login as admin");
  window.location.href = "admin_login.html";
}
</script>

<body>

<div class="sidebar">
  <h2>人工智能贸易</h2>
  <a href="dashboard.html" class="active">仪表板</a>
  <a href="trade_management.html">交易管理</a>
  <a href="user_management.html">用户管理</a>
  <a href="kyc.html">KYC审核</a>
  <a href="order_management.html">订单管理</a>
  <a href="withdraw_management.html">提现管理</a>
  <a href="customer_service.html">客服管理</a>
</div>

<div class="main">

  <h1>后台仪表盘</h1>
  <div class="desc">平台核心数据总览与运营监控中心</div>

  <div class="grid">
    <div class="card">
      <p>总用户数</p>
      <h2 id="totalUsers">0</h2>
    </div>

    <div class="card">
      <p>用户总资产</p>
      <h2 id="totalAssets">0 USDT</h2>
    </div>

    <div class="card">
      <p>交易订单数</p>
      <h2 id="totalOrders">0</h2>
    </div>

    <div class="card">
      <p>运行中订单</p>
      <h2 id="runningOrders">0</h2>
    </div>

    <div class="card">
      <p>已完成订单</p>
      <h2 id="completedOrders">0</h2>
    </div>

    <div class="card">
      <p>总交易金额</p>
      <h2 id="totalVolume">0 USDT</h2>
    </div>

    <div class="card">
      <p>总收益</p>
      <h2 id="totalProfit">0 USDT</h2>
    </div>

    <div class="card">
      <p>待审核提现</p>
      <h2 id="pendingWithdraw">0</h2>
    </div>
  </div>

  <div class="section">
    <h2>快速入口</h2>
    <div class="quick">
      <a href="user_management.html">用户管理</a>
      <a href="trade_management.html">交易管理</a>
      <a href="order_management.html">订单管理</a>
      <a href="withdraw_management.html">提现管理</a>
      <a href="kyc.html">KYC审核</a>
    </div>
  </div>

  <div class="section">
    <h2>最近交易动态</h2>
    <table>
      <thead>
        <tr>
          <th>订单号</th>
          <th>UID</th>
          <th>用户</th>
          <th>类型</th>
          <th>产品</th>
          <th>金额</th>
          <th>收益</th>
          <th>状态</th>
          <th>时间</th>
        </tr>
      </thead>
      <tbody id="recentOrders"></tbody>
    </table>
  </div>

</div>

<script>
// ==================== 配置 ====================
const API_BASE = "https://ai-trading-system-j5jf.onrender.com";
const ADMIN_TOKEN = "AI_ADMIN_2026";

let users = [];
let orders = [];
let withdrawals = [];

// ==================== 格式化金额 ====================
function formatUSDT(value){
  return Number(value || 0).toLocaleString(undefined,{
    minimumFractionDigits:2,
    maximumFractionDigits:2
  }) + " USDT";
}

// ==================== 获取用户资产（兼容多种字段） ====================
function getUserAsset(user){
  return Number(user.availableBalance || user.asset || user.balance || 0);
}

// ==================== 加载仪表盘数据（修复：添加admin-token） ====================
async function loadDashboard(){
  try{
    // 获取用户列表
    const userRes = await fetch(`${API_BASE}/api/users`, {
      headers: {
        "admin-token": ADMIN_TOKEN
      }
    });
    const userResult = await userRes.json();

    if(userResult.success){
      users = userResult.data || [];
    }

    // 获取交易订单
    const orderRes = await fetch(`${API_BASE}/api/admin/trade-orders`, {
      headers: {
        "admin-token": ADMIN_TOKEN
      }
    });
    const orderResult = await orderRes.json();

    if(orderResult.success){
      orders = orderResult.data || [];
    }

    // 获取提现记录
    const withdrawRes = await fetch(`${API_BASE}/api/withdrawals`, {
      headers: {
        "admin-token": ADMIN_TOKEN
      }
    });
    withdrawals = await withdrawRes.json();

    renderDashboard();

  }catch(err){
    console.log(err);
    alert("仪表盘数据加载失败，请确认 server.js 已启动");
  }
}

// ==================== 渲染仪表盘 ====================
function renderDashboard(){
  // 修复：使用兼容的资产字段
  const totalAssets = users.reduce((sum, user) => {
    return sum + getUserAsset(user);
  }, 0);

  const runningOrders = orders.filter(o => o.status === "Running").length;
  const completedOrders = orders.filter(o => o.status === "Completed").length;

  const totalVolume = orders.reduce((sum, o) => {
    return sum + Number(o.amount || 0);
  }, 0);

  const totalProfit = orders.reduce((sum, o) => {
    return sum + Number(o.profit || 0);
  }, 0);

  const pendingWithdraw = withdrawals.filter(w => w.status === "Pending").length;

  document.getElementById("totalUsers").innerText = users.length;
  document.getElementById("totalAssets").innerText = formatUSDT(totalAssets);
  document.getElementById("totalOrders").innerText = orders.length;
  document.getElementById("runningOrders").innerText = runningOrders;
  document.getElementById("completedOrders").innerText = completedOrders;
  document.getElementById("totalVolume").innerText = formatUSDT(totalVolume);
  document.getElementById("totalProfit").innerText = formatUSDT(totalProfit);
  document.getElementById("pendingWithdraw").innerText = pendingWithdraw;

  renderRecentOrders();
}

// ==================== 获取状态文本 ====================
function getStatusText(status){
  if(status === "Running") return "运行中";
  if(status === "Completed") return "已完成";
  return status || "未知";
}

// ==================== 渲染最近订单 ====================
function renderRecentOrders(){
  const tbody = document.getElementById("recentOrders");
  tbody.innerHTML = "";

  const recent = orders.slice(0,10);

  if(recent.length === 0){
    tbody.innerHTML = `
      <tr>
        <td colspan="9">暂无交易订单</td>
      </tr>
    `;
    return;
  }

  recent.forEach(order => {
    const statusClass = order.status === "Completed" ? "status-completed" : "status-running";

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${order.id || ""}</td>
      <td>${order.uid || ""}</td>
      <td>${order.user || ""}</td>
      <td>${order.type || ""}</td>
      <td>${order.coin || ""}</td>
      <td>${formatUSDT(order.amount)}</td>
      <td>${formatUSDT(order.profit)}</td>
      <td class="${statusClass}">${getStatusText(order.status)}</td>
      <td>${order.time || ""}</td>
    `;

    tbody.appendChild(tr);
  });
}

// ==================== 页面启动 ====================
loadDashboard();
</script>

</body>
</html>
