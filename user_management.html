<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>用户管理</title>

<style>
body {
  margin: 0;
  background: #0b0b0b;
  color: white;
  font-family: Arial, sans-serif;
}

.sidebar {
  width: 260px;
  height: 100vh;
  background: #1a1a1a;
  position: fixed;
  left: 0;
  top: 0;
  padding-top: 20px;
}

.sidebar h2 {
  color: #7c4dff;
  padding-left: 20px;
  margin-bottom: 40px;
}

.sidebar a {
  display: block;
  color: white;
  text-decoration: none;
  padding: 15px 20px;
  font-size: 18px;
}

.sidebar a:hover {
  background: #333;
}

.main {
  margin-left: 260px;
  padding: 30px;
}

h1 {
  color: #7c4dff;
  font-size: 52px;
  margin-bottom: 20px;
}

/* 统计卡片 */

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  margin-bottom: 25px;
}

.stat-card {
  background: #181818;
  border: 1px solid #333;
  border-radius: 12px;
  padding: 22px;
}

.stat-card p {
  margin: 0;
  color: #aaa;
  font-size: 15px;
}

.stat-card h2 {
  margin: 12px 0 0;
  font-size: 28px;
  color: #7c4dff;
}

/* 搜索 */

.search-box {
  margin-bottom: 20px;
}

#searchInput {
  width: 360px;
  padding: 12px;
  border-radius: 6px;
  border: none;
  background: #222;
  color: white;
  font-size: 16px;
  outline: none;
}

/* 按钮 */

.add-user-btn {
  background: #7c4dff;
  color: white;
  padding: 12px 22px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  margin-bottom: 25px;
  font-weight: bold;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #141414;
}

th,
td {
  border: 1px solid #333;
  padding: 16px;
  text-align: center;
}

th {
  background: #1f1f1f;
}

tr:hover {
  background: #1a1a1a;
}

.username-link {
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.username-link:hover {
  color: #7c4dff;
}

.status.active {
  color: #00ff88;
  font-weight: bold;
}

.status.frozen {
  color: orange;
  font-weight: bold;
}

.status.blacklisted {
  color: red;
  font-weight: bold;
}

input {
  width: 100px;
  padding: 9px;
  border-radius: 5px;
  border: none;
  background: #222;
  color: white;
  margin-right: 6px;
}

button {
  border: none;
  padding: 9px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

.recharge-btn {
  background: #00c853;
  color: white;
}

.withdraw-btn {
  background: #2979ff;
  color: white;
}

.freeze-btn {
  background: orange;
  color: black;
}

.blacklist-btn {
  background: red;
  color: white;
}

/* 弹窗 */

.modal {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.75);
}

.modal-content {
  background: #181818;
  width: 560px;
  margin: 80px auto;
  padding: 25px;
  border-radius: 10px;
  border: 1px solid #333;
}

.modal-content h2 {
  color: #7c4dff;
  margin-top: 0;
}

.detail-row {
  margin: 12px 0;
  font-size: 16px;
}

.detail-row span {
  color: #aaa;
  display: inline-block;
  width: 100px;
}

.record-box {
  margin-top: 15px;
  background: #101010;
  border: 1px solid #333;
  padding: 15px;
  border-radius: 8px;
}

.record-box p {
  margin: 8px 0;
  color: #ddd;
}

.close-btn {
  background: red;
  color: white;
  margin-top: 20px;
}
</style>
</head>

<script>
const adminAuth = JSON.parse(localStorage.getItem("adminAuth") || "null");

if (!adminAuth || adminAuth.role !== "admin") {
  alert("Please login as admin");
  window.location.href = "admin_login.html";
}
</script>

<body>

<div class="sidebar">
  <h2>人工智能贸易</h2>

  <a href="dashboard.html" class="active">仪表板</a>
  <a href="trade_management.html">交易管理</a>
  <a href="user_management.html">用户管理</a>
  <a href="kyc.html">KYC审核</a>
  <a href="order_management.html">订单管理</a>
  <a href="customer_service.html">客服管理</a>
  <a href="withdraw_management.html">提现管理</a>
</div>

<div class="main">

  <h1>用户管理</h1>

  <!-- 统计卡片 -->

  <div class="stats">

    <div class="stat-card">
      <p>总用户</p>
      <h2 id="totalUsers">0</h2>
    </div>

    <div class="stat-card">
      <p>总资产</p>
      <h2 id="totalAssets">0 USDT</h2>
    </div>

    <div class="stat-card">
      <p>冻结用户</p>
      <h2 id="frozenUsers">0</h2>
    </div>

    <div class="stat-card">
      <p>今日充值</p>
      <h2 id="todayRecharge">0 USDT</h2>
    </div>

    <div class="stat-card">
      <p>本月充值</p>
      <h2 id="monthRecharge">0 USDT</h2>
    </div>

    <div class="stat-card">
      <p>今日提现</p>
      <h2 id="todayWithdraw">0 USDT</h2>
    </div>

    <div class="stat-card">
      <p>本月提现</p>
      <h2 id="monthWithdraw">0 USDT</h2>
    </div>

  </div>

  <!-- 搜索 -->

  <div class="search-box">
    <input
      type="text"
      id="searchInput"
      placeholder="搜索用户名 / 钱包地址 / 状态"
      oninput="searchUsers()"
    />
  </div>

  <!-- 新增用户 -->

  <button
    class="add-user-btn"
    onclick="addUserPrompt()"
  >
    新增用户
  </button>

  <!-- 表格 -->

  <table>

    <thead>
      <tr>
        <th>ID</th>
        <th>用户名</th>
        <th>钱包地址</th>
        <th>用户资产</th>
        <th>状态</th>
        <th>充值</th>
        <th>提现</th>
        <th>冻结</th>
        <th>拉黑</th>
      </tr>
    </thead>

    <tbody id="userTable"></tbody>

  </table>

</div>

<!-- 用户详情弹窗 -->

<div id="userModal" class="modal">

  <div class="modal-content">

    <h2 id="detailName">用户详情</h2>

    <div class="detail-row">
      <span>邮箱：</span>
      <strong id="detailEmail"></strong>
    </div>

    <div class="detail-row">
      <span>手机号：</span>
      <strong id="detailPhone"></strong>
    </div>

    <div class="detail-row">
      <span>注册时间：</span>
      <strong id="detailRegister"></strong>
    </div>

    <div class="detail-row">
      <span>登录IP：</span>
      <strong id="detailIp"></strong>
    </div>

    <div class="detail-row">
      <span>KYC状态：</span>
      <strong id="detailKyc"></strong>
    </div>

    <div class="record-box">
      <h3>交易记录</h3>
      <div id="detailRecords"></div>
    </div>

    <button
      class="close-btn"
      onclick="closeUserDetail()"
    >
      关闭
    </button>

  </div>

</div>

<script>

let users = [];

async function loadUsers() {

  const response = await fetch(
    "https://ai-trading-system-j5jf.onrender.com/api/users",
    {
      method: "GET",
      headers: {
        "admin-token": "AI_ADMIN_2026"
      }
    }
);

  const result = await response.json();

  if(result.success){
    users = result.data || [];
    renderTable();
  }else{
    alert(result.message || "加载用户失败");
  }
}

let todayRecharge =
  Number(localStorage.getItem("todayRecharge") || "0");

let monthRecharge =
  Number(localStorage.getItem("monthRecharge") || "0");

let todayWithdraw =
  Number(localStorage.getItem("todayWithdraw") || "0");

let monthWithdraw =
  Number(localStorage.getItem("monthWithdraw") || "0");

/* 保存 */

function saveUsers() {

  localStorage.setItem(
    "users",
    JSON.stringify(users)
  );

  localStorage.setItem(
    "todayRecharge",
    String(todayRecharge)
  );

  localStorage.setItem(
    "monthRecharge",
    String(monthRecharge)
  );

  localStorage.setItem(
    "todayWithdraw",
    String(todayWithdraw)
  );

  localStorage.setItem(
    "monthWithdraw",
    String(monthWithdraw)
  );
}

/* 格式化 */

function formatUSDT(value) {
  return Number(value).toLocaleString() + " USDT";
}

/* 更新统计 */

function updateStats() {

  const totalUsers =
    users.length;

  const totalAssets =
  users.reduce((sum, user) => {
    return sum + Number(user.balance || user.asset || 0);
  }, 0);

  const frozenUsers =
    users.filter(user =>
      user.status === "冻结"
    ).length;

  document.getElementById("totalUsers").innerText =
    totalUsers;

  document.getElementById("totalAssets").innerText =
    formatUSDT(totalAssets);

  document.getElementById("frozenUsers").innerText =
    frozenUsers;

  document.getElementById("todayRecharge").innerText =
    formatUSDT(todayRecharge);

  document.getElementById("monthRecharge").innerText =
    formatUSDT(monthRecharge);

  document.getElementById("todayWithdraw").innerText =
    formatUSDT(todayWithdraw);

  document.getElementById("monthWithdraw").innerText =
    formatUSDT(monthWithdraw);
}

/* 渲染表格 */

function renderTable() {

  const tbody =
    document.getElementById("userTable");

  tbody.innerHTML = "";

  users.forEach(user => {

    const tr =
      document.createElement("tr");

    const userId = user._id;
    const username = user.username || user.name || "Unknown";
    const wallet = user.wallet || "Not Connected";
    const asset = user.balance || user.asset || 0;
    const status = user.status || "正常";

    tr.innerHTML = `
      <td>${user.uid || userId}</td>

      <td>
        <span
          class="username-link"
          onclick="showUserDetail('${userId}')"
        >
          ${username}
        </span>
      </td>

      <td>${wallet}</td>

      <td>${formatUSDT(asset)}</td>

      <td class="status">
        ${status}
      </td>

      <td>
        <input
          type="number"
          class="recharge-input"
          placeholder="充值金额"
        />

        <button
          class="recharge-btn"
          onclick="recharge('${userId}', this)"
        >
          充值
        </button>
      </td>

      <td>
        <input
          type="number"
          class="withdraw-input"
          placeholder="提现金额"
        />

        <button
          class="withdraw-btn"
          onclick="withdraw('${userId}', this)"
        >
          提现
        </button>
      </td>

      <td>
        <button
          class="freeze-btn"
          onclick="freezeUser('${userId}')"
        >
          ${status === "冻结" ? "解冻" : "冻结"}
        </button>
      </td>

      <td>
        <button
  class="blacklist-btn"
  onclick="${status === '拉黑' ? `restoreUser('${userId}')` : `blacklistUser('${userId}')`}"
   >
  ${status === "拉黑" ? "恢复" : "拉黑"}
   </button>
      </td>
    `;

    tbody.appendChild(tr);

  });

  updateStats();
}



/* 搜索 */

function searchUsers() {

  const keyword =
    document
      .getElementById("searchInput")
      .value
      .toLowerCase();

  const rows =
    document.querySelectorAll("#userTable tr");

  rows.forEach(row => {

    const text =
      row.innerText.toLowerCase();

    row.style.display =
      text.includes(keyword)
      ? ""
      : "none";

  });

}

/* 新增用户 */

function addUserPrompt() {

  const name =
    prompt("请输入用户名:");

  if (!name) return;

  const wallet =
    prompt("请输入钱包地址:");

  if (!wallet) return;

  const email =
    prompt("请输入邮箱:");

  if (!email) return;

  const phone =
    prompt("请输入手机号:");

  if (!phone) return;

  const assetInput =
    prompt("请输入初始资产:");

  let asset =
    parseFloat(assetInput);

  if (isNaN(asset) || asset < 0) {

    alert("资产错误");

    return;
  }

  const maxId =
    users.length
    ? Math.max(...users.map(u => u.id))
    : 0;

  users.push({

    id: maxId + 1,

    name,

    wallet,

    asset,

    email,

    phone,

    register:
      new Date().toLocaleDateString(),

    ip:
      "192.168.1." +
      Math.floor(Math.random() * 255),

    kyc: "未审核",

    status: "正常",

    statusClass: "active",

    records: [
      "创建用户"
    ]

  });

  saveUsers();

  renderTable();
}

/* 充值 */

async function recharge(id, btn) {

  const row =
    btn.closest("tr");

  const input =
    row.querySelector(".recharge-input");

  const amount =
    Number(input.value);

  if (!amount || amount <= 0) {

    alert("请输入正确金额");

    return;
  }

 const response = await fetch(
  "https://ai-trading-system-j5jf.onrender.com/api/users/" + id + "/recharge",
  {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "admin-token": "AI_ADMIN_2026"
    },
    body: JSON.stringify({ amount: amount })
  }
);

  const result =
    await response.json();

  if (result.success) {

    alert("充值成功");

    input.value = "";

    loadUsers();

  } else {

    alert(result.message || "充值失败");
  }
}

/* 提现 */

async function withdraw(id, btn) {
  const row = btn.closest("tr");
  const input = row.querySelector(".withdraw-input");
  const amount = Number(input.value);

  if (!amount || amount <= 0) {
    alert("请输入正确金额");
    return;
  }

 const response = await fetch(
  "https://ai-trading-system-j5jf.onrender.com/api/users/" + id + "/withdraw",
  {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "admin-token": "AI_ADMIN_2026"
    },
    body: JSON.stringify({ amount })
  }
);

  const result = await response.json();

  if (result.success) {
    alert("提现成功");
    input.value = "";
    loadUsers();
  } else {
    alert(result.message || "提现失败");
  }
}

/* 冻结 */

async function freezeUser(id) {

  const response = await fetch(
    "https://ai-trading-system-j5jf.onrender.com/api/users/" + id + "/freeze",
    {
      method: "PUT",
      headers:{
        "admin-token":"AI_ADMIN_2026"
      }
    }
  );

  const result = await response.json();

  if (result.success) {
    alert("操作成功");
    loadUsers();
  } else {
    alert(result.message || "操作失败");
  }
}

 

/* 拉黑 */

async function blacklistUser(id) {

  const response = await fetch(
    "https://ai-trading-system-j5jf.onrender.com/api/users/" + id + "/blacklist",
    {
      method: "PUT",
      headers:{
        "admin-token":"AI_ADMIN_2026"
      }
    }
  );

  const result = await response.json();

  if (result.success) {
    alert("拉黑成功");
    loadUsers();
  } else {
    alert(result.message || "拉黑失败");
  }
}

async function restoreUser(id) {

  const response = await fetch(
    "https://ai-trading-system-j5jf.onrender.com/api/users/" + id + "/restore",
    {
      method: "PUT",
      headers:{
        "admin-token":"AI_ADMIN_2026"
      }
    }
  );

  const result = await response.json();

  if (result.success) {
    alert("恢复成功");
    loadUsers();
  } else {
    alert(result.message || "恢复失败");
  }
}

/* 用户详情 */

function showUserDetail(id) {

  const user =
  users.find(u => u._id === id);

  document.getElementById("detailName").innerText =
    "用户详情：" + user.name;

  document.getElementById("detailEmail").innerText =
    user.email;

  document.getElementById("detailPhone").innerText =
    user.phone;

  document.getElementById("detailRegister").innerText =
    user.register;

  document.getElementById("detailIp").innerText =
    user.ip;

  document.getElementById("detailKyc").innerText =
    user.kyc;

  document.getElementById("detailRecords").innerHTML =
    user.records
      .map(item => `<p>${item}</p>`)
      .join("");

  document.getElementById("userModal").style.display =
    "block";
}

/* 关闭弹窗 */

function closeUserDetail() {

  document.getElementById("userModal").style.display =
    "none";
}

window.onclick = function(event) {

  const modal =
    document.getElementById("userModal");

  if (event.target === modal) {

    modal.style.display = "none";
  }
};

/* 初始化 */

loadUsers();

</script>

</body>
</html>
