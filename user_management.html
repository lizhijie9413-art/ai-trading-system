<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>用户管理 - AI Trade Admin</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#07070b;
  color:white;
}

.sidebar{
  width:260px;
  height:100vh;
  background:#151515;
  position:fixed;
  left:0;
  top:0;
  padding-top:25px;
}

.sidebar h2{
  color:#7c4dff;
  padding-left:22px;
  margin-bottom:35px;
}

.sidebar a{
  display:block;
  color:white;
  text-decoration:none;
  padding:15px 22px;
  font-size:17px;
  font-weight:bold;
  transition:all 0.3s;
}

.sidebar a:hover,
.sidebar a.active{
  background:#252525;
  color:#7c4dff;
}

.main{
  margin-left:260px;
  padding:35px;
  min-height:100vh;
}

h1{
  font-size:48px;
  color:#7c4dff;
  margin-bottom:28px;
}

/* 统计卡片 - 3x3网格 */
.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  margin-bottom:30px;
}

.stat-card{
  background:#171717;
  border:1px solid #333;
  border-radius:16px;
  padding:22px;
  transition:all 0.3s;
}

.stat-card:hover{
  transform:translateY(-2px);
  border-color:#7c4dff;
}

.stat-card p{
  color:#aaa;
  font-size:14px;
  margin-bottom:12px;
}

.stat-card h2{
  color:#7c4dff;
  font-size:28px;
}

/* 搜索和操作栏 */
.action-bar{
  display:flex;
  gap:15px;
  margin-bottom:25px;
  flex-wrap:wrap;
  align-items:center;
}

.search-box input{
  width:320px;
  padding:12px 16px;
  border-radius:10px;
  border:none;
  background:#1f1f1f;
  color:white;
  font-size:15px;
  outline:none;
}

.search-box input:focus{
  border:1px solid #7c4dff;
}

.add-user-btn{
  background:#7c4dff;
  color:white;
  padding:12px 24px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  transition:all 0.3s;
}

.add-user-btn:hover{
  background:#6a3dff;
  transform:translateY(-2px);
}

/* 表格 */
.table-wrapper{
  overflow-x:auto;
  border-radius:16px;
  border:1px solid #333;
  background:#121212;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:1200px;
}

th{
  background:#1d1d1d;
  color:white;
  padding:16px;
  border:1px solid #333;
  font-size:14px;
  font-weight:bold;
}

td{
  padding:14px;
  border:1px solid #333;
  text-align:center;
  color:#ddd;
  font-size:13px;
}

tr:hover{
  background:#1a1a1a;
}

.username-link{
  color:#c084fc;
  font-weight:bold;
  cursor:pointer;
  text-decoration:none;
}

.username-link:hover{
  text-decoration:underline;
}

.status-active{
  color:#00ff88;
  font-weight:bold;
}

.status-frozen{
  color:#ffaa00;
  font-weight:bold;
}

.status-blacklisted{
  color:#ff4d6d;
  font-weight:bold;
}

/* 输入框 */
.recharge-input, .withdraw-input{
  width:100px;
  padding:8px;
  border-radius:6px;
  border:none;
  background:#2a2a2a;
  color:white;
  text-align:center;
}

/* 按钮 */
.recharge-btn{
  background:#00c853;
  color:white;
  padding:8px 14px;
  border-radius:6px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  margin-left:5px;
}

.withdraw-btn{
  background:#2979ff;
  color:white;
  padding:8px 14px;
  border-radius:6px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  margin-left:5px;
}

.freeze-btn{
  background:#ff9800;
  color:#000;
  padding:8px 14px;
  border-radius:6px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.blacklist-btn{
  background:#f44336;
  color:white;
  padding:8px 14px;
  border-radius:6px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.restore-btn{
  background:#2196f3;
  color:white;
  padding:8px 14px;
  border-radius:6px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  opacity:0.85;
  transform:translateY(-1px);
}

/* 弹窗 */
.modal{
  display:none;
  position:fixed;
  z-index:1000;
  left:0;
  top:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
}

.modal-content{
  background:#1a1a1a;
  width:500px;
  margin:80px auto;
  padding:25px;
  border-radius:16px;
  border:1px solid #7c4dff;
  box-shadow:0 0 30px rgba(124,77,255,.2);
}

.modal-content h2{
  color:#7c4dff;
  margin-top:0;
  margin-bottom:20px;
}

.detail-row{
  margin:12px 0;
  font-size:15px;
  padding:8px 0;
  border-bottom:1px solid #333;
}

.detail-row span{
  color:#aaa;
  display:inline-block;
  width:100px;
}

.detail-row strong{
  color:white;
}

.record-box{
  margin-top:20px;
  background:#101010;
  border:1px solid #333;
  padding:15px;
  border-radius:12px;
  max-height:200px;
  overflow-y:auto;
}

.record-box h3{
  color:#c084fc;
  margin-bottom:12px;
  font-size:16px;
}

.record-box p{
  margin:8px 0;
  color:#bbb;
  font-size:13px;
  padding:5px;
  border-bottom:1px solid #2a2a2a;
}

.close-btn{
  background:#f44336;
  color:white;
  padding:10px 20px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  margin-top:20px;
  width:100%;
}

.empty{
  text-align:center;
  padding:40px;
  color:#888;
}

.loading{
  text-align:center;
  padding:40px;
  color:#c084fc;
}
</style>
</head>

<script>
const adminAuth = JSON.parse(localStorage.getItem("adminAuth") || "null");

if (!adminAuth || adminAuth.role !== "admin") {
  alert("Please login as admin");
  window.location.href = "admin_login.html";
}
</script>

<body>

<div class="sidebar">
  <h2>AI Trade Admin</h2>
  <a href="dashboard.html">仪表板</a>
  <a href="trade_management.html">交易管理</a>
  <a href="user_management.html" class="active">用户管理</a>
  <a href="kyc.html">KYC审核</a>
  <a href="order_management.html">订单管理</a>
  <a href="withdraw_management.html">提现管理</a>
  <a href="customer_service.html">客服管理</a>
</div>

<div class="main">

  <h1>用户管理</h1>

  <!-- 统计卡片 -->
  <div class="stats">
    <div class="stat-card"><p>总用户数</p><h2 id="totalUsers">0</h2></div>
    <div class="stat-card"><p>总资产</p><h2 id="totalAssets">0 USDT</h2></div>
    <div class="stat-card"><p>冻结/拉黑</p><h2 id="frozenUsers">0</h2></div>
    <div class="stat-card"><p>今日充值</p><h2 id="todayRecharge">0 USDT</h2></div>
    <div class="stat-card"><p>本月充值</p><h2 id="monthRecharge">0 USDT</h2></div>
    <div class="stat-card"><p>今日提现</p><h2 id="todayWithdraw">0 USDT</h2></div>
    <div class="stat-card"><p>本月提现</p><h2 id="monthWithdraw">0 USDT</h2></div>
  </div>

  <!-- 操作栏 -->
  <div class="action-bar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索用户名 / 邮箱 / UID" oninput="searchUsers()">
    </div>
    <button class="add-user-btn" onclick="addUserPrompt()">+ 新增用户</button>
  </div>

  <!-- 表格 -->
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>UID</th><th>用户名</th><th>邮箱</th><th>余额</th><th>总收益</th><th>状态</th><th>KYC</th><th>充值</th><th>提现</th><th>操作</th>
        </tr>
      </thead>
      <tbody id="userTable">
        <tr><td colspan="10" class="loading">加载用户数据中...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<!-- 用户详情弹窗 -->
<div id="userModal" class="modal">
  <div class="modal-content">
    <h2 id="detailName">用户详情</h2>
    <div class="detail-row"><span>邮箱：</span><strong id="detailEmail"></strong></div>
    <div class="detail-row"><span>手机号：</span><strong id="detailPhone"></strong></div>
    <div class="detail-row"><span>UID：</span><strong id="detailUid"></strong></div>
    <div class="detail-row"><span>KYC状态：</span><strong id="detailKyc"></strong></div>
    <div class="detail-row"><span>注册时间：</span><strong id="detailRegister"></strong></div>
    <div class="record-box"><h3>操作记录</h3><div id="detailRecords"></div></div>
    <button class="close-btn" onclick="closeUserDetail()">关闭</button>
  </div>
</div>

<script>
// ==================== 配置 ====================
const API_BASE = "https://ai-trading-system-j5jf.onrender.com";
const ADMIN_TOKEN = "AI_ADMIN_2026";

let users = [];
let stats = { todayRecharge: 0, monthRecharge: 0, todayWithdraw: 0, monthWithdraw: 0 };

// ==================== 格式化 ====================
function formatMoney(value){
  return Number(value || 0).toLocaleString(undefined, {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  }) + " USDT";
}

// ==================== 加载用户 ====================
async function loadUsers() {
  const tbody = document.getElementById("userTable");
  tbody.innerHTML = '<tr><td colspan="10" class="loading">加载用户数据中...</td></tr>';
  
  try {
    const response = await fetch(`${API_BASE}/api/users`, {
      headers: { "admin-token": ADMIN_TOKEN }
    });
    const result = await response.json();

    if (result.success && result.data) {
      users = result.data;
      stats = result.stats || { todayRecharge: 0, monthRecharge: 0, todayWithdraw: 0, monthWithdraw: 0 };
      renderTable();
      updateStats();
    } else {
      tbody.innerHTML = '<tr><td colspan="10" class="empty">加载失败</td></tr>';
    }
  } catch (error) {
    console.error(error);
    tbody.innerHTML = '<tr><td colspan="10" class="empty">网络错误</td></tr>';
  }
}

// ==================== 渲染表格 ====================
function renderTable() {
  const tbody = document.getElementById("userTable");
  
  if (!users || users.length === 0) {
    tbody.innerHTML = '<tr><td colspan="10" class="empty">暂无用户数据</td></tr>';
    return;
  }

  tbody.innerHTML = users.map(user => {
    const balance = user.availableBalance !== undefined ? user.availableBalance : (user.asset || 0);
    const totalProfit = user.totalProfit || 0;
    const statusText = user.status === 'active' ? '正常' : (user.status === 'frozen' ? '冻结' : '拉黑');
    const statusClass = user.status === 'active' ? 'status-active' : (user.status === 'frozen' ? 'status-frozen' : 'status-blacklisted');
    const kycText = user.kyc || '未审核';
    
    // 操作按钮
    let actionButtons = '';
    if (user.status !== 'blacklisted') {
      actionButtons = `<button class="freeze-btn" onclick="freezeUser('${user._id}')">${user.status === 'frozen' ? '解冻' : '冻结'}</button>
                       <button class="blacklist-btn" onclick="blacklistUser('${user._id}')">拉黑</button>`;
    } else {
      actionButtons = `<button class="restore-btn" onclick="restoreUser('${user._id}')">恢复</button>`;
    }
    
    return `
      <tr>
        <td>${user.uid || '-'}</td>
        <td><span class="username-link" onclick="showUserDetail('${user._id}')">${escapeHtml(user.name || '-')}</span></td>
        <td>${escapeHtml(user.email || '-')}</td>
        <td>${formatMoney(balance)}</td>
        <td>${formatMoney(totalProfit)}</td>
        <td class="${statusClass}">${statusText}</td>
        <td>${kycText}</td>
        <td><input type="number" class="recharge-input" id="recharge_${user._id}" placeholder="金额"><button class="recharge-btn" onclick="rechargeUser('${user._id}')">充值</button></td>
        <td><input type="number" class="withdraw-input" id="withdraw_${user._id}" placeholder="金额"><button class="withdraw-btn" onclick="withdrawUser('${user._id}')">提现</button></td>
        <td>${actionButtons}</td>
      </tr>
    `;
  }).join('');
}

// ==================== 更新统计 ====================
function updateStats() {
  const totalAssets = users.reduce((sum, u) => sum + (u.availableBalance !== undefined ? u.availableBalance : (u.asset || 0)), 0);
  const frozenCount = users.filter(u => u.status === 'frozen' || u.status === 'blacklisted').length;
  
  document.getElementById("totalUsers").innerText = users.length;
  document.getElementById("totalAssets").innerText = formatMoney(totalAssets);
  document.getElementById("frozenUsers").innerText = frozenCount;
  document.getElementById("todayRecharge").innerText = formatMoney(stats?.todayRecharge || 0);
  document.getElementById("monthRecharge").innerText = formatMoney(stats?.monthRecharge || 0);
  document.getElementById("todayWithdraw").innerText = formatMoney(stats?.todayWithdraw || 0);
  document.getElementById("monthWithdraw").innerText = formatMoney(stats?.monthWithdraw || 0);
}

// ==================== 搜索 ====================
function searchUsers() {
  const keyword = document.getElementById("searchInput").value.toLowerCase();
  const rows = document.querySelectorAll("#userTable tr");
  rows.forEach(row => {
    if (row.cells && row.cells.length > 0) {
      const text = row.innerText.toLowerCase();
      row.style.display = text.includes(keyword) ? "" : "none";
    }
  });
}

// ==================== XSS防护 ====================
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
}

// ==================== 充值 ====================
async function rechargeUser(userId) {
  const input = document.getElementById(`recharge_${userId}`);
  const amount = Number(input.value);
  if (!amount || amount <= 0) { alert("请输入正确金额"); return; }
  
  const response = await fetch(`${API_BASE}/api/users/${userId}/recharge`, {
    method: "PUT",
    headers: { "Content-Type": "application/json", "admin-token": ADMIN_TOKEN },
    body: JSON.stringify({ amount })
  });
  const result = await response.json();
  if (result.success) { alert("充值成功"); input.value = ""; loadUsers(); }
  else { alert(result.message || "充值失败"); }
}

// ==================== 提现 ====================
async function withdrawUser(userId) {
  const input = document.getElementById(`withdraw_${userId}`);
  const amount = Number(input.value);
  if (!amount || amount <= 0) { alert("请输入正确金额"); return; }
  
  const response = await fetch(`${API_BASE}/api/users/${userId}/withdraw`, {
    method: "PUT",
    headers: { "Content-Type": "application/json", "admin-token": ADMIN_TOKEN },
    body: JSON.stringify({ amount })
  });
  const result = await response.json();
  if (result.success) { alert("提现成功"); input.value = ""; loadUsers(); }
  else { alert(result.message || "提现失败"); }
}

// ==================== 冻结/解冻 ====================
async function freezeUser(userId) {
  if (!confirm("确定要冻结/解冻该用户吗？")) return;
  const response = await fetch(`${API_BASE}/api/users/${userId}/freeze`, {
    method: "PUT",
    headers: { "admin-token": ADMIN_TOKEN }
  });
  const result = await response.json();
  if (result.success) { alert("操作成功"); loadUsers(); }
  else { alert(result.message || "操作失败"); }
}

// ==================== 拉黑 ====================
async function blacklistUser(userId) {
  if (!confirm("确定要拉黑该用户吗？")) return;
  const response = await fetch(`${API_BASE}/api/users/${userId}/blacklist`, {
    method: "PUT",
    headers: { "admin-token": ADMIN_TOKEN }
  });
  const result = await response.json();
  if (result.success) { alert("拉黑成功"); loadUsers(); }
  else { alert(result.message || "拉黑失败"); }
}

// ==================== 恢复 ====================
async function restoreUser(userId) {
  if (!confirm("确定要恢复该用户吗？")) return;
  const response = await fetch(`${API_BASE}/api/users/${userId}/restore`, {
    method: "PUT",
    headers: { "admin-token": ADMIN_TOKEN }
  });
  const result = await response.json();
  if (result.success) { alert("恢复成功"); loadUsers(); }
  else { alert(result.message || "恢复失败"); }
}

// ==================== 新增用户 ====================
async function addUserPrompt() {
  const name = prompt("请输入用户名:");
  if (!name) return;
  const email = prompt("请输入邮箱:");
  if (!email) return;
  
  const response = await fetch(`${API_BASE}/api/users`, {
    method: "POST",
    headers: { "Content-Type": "application/json", "admin-token": ADMIN_TOKEN },
    body: JSON.stringify({ name, email, asset: 0, status: "active" })
  });
  const result = await response.json();
  if (result.success) { alert("用户创建成功"); loadUsers(); }
  else { alert(result.message || "创建失败"); }
}

// ==================== 显示详情 ====================
async function showUserDetail(userId) {
  const user = users.find(u => u._id === userId);
  if (!user) return;
  
  document.getElementById("detailName").innerText = "用户详情：" + (user.name || "-");
  document.getElementById("detailEmail").innerText = user.email || "-";
  document.getElementById("detailPhone").innerText = user.phone || "-";
  document.getElementById("detailUid").innerText = user.uid || "-";
  document.getElementById("detailKyc").innerText = user.kyc || "未审核";
  document.getElementById("detailRegister").innerText = user.createdAt ? new Date(user.createdAt).toLocaleString() : "-";
  
  const records = user.records || [];
  document.getElementById("detailRecords").innerHTML = records.length ? records.map(r => `<p>${typeof r === 'object' ? r.message : r}</p>`).join('') : "<p>暂无记录</p>";
  
  document.getElementById("userModal").style.display = "block";
}

function closeUserDetail() {
  document.getElementById("userModal").style.display = "none";
}

window.onclick = function(event) {
  const modal = document.getElementById("userModal");
  if (event.target === modal) modal.style.display = "none";
};

// ==================== 启动 ====================
loadUsers();
setInterval(loadUsers, 30000);
</script>

</body>
</html>
