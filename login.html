<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#050816;
    min-height:100vh;
    padding:40px 16px;
    overflow-x:hidden;
    overflow-y:auto;
    display:flex;
    justify-content:center;
    align-items:center;
}

body::before{
    pointer-events:none;
    z-index:-1;
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#00f0ff22;
    filter:blur(120px);
    top:-100px;
    left:-100px;
    animation:glowMove 8s ease-in-out infinite alternate;
}

body::after{
    pointer-events:none;
    z-index:-1;
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#7b00ff22;
    filter:blur(120px);
    bottom:-100px;
    right:-100px;
    animation:glowMove2 10s ease-in-out infinite alternate;
}

@keyframes glowMove{
    0%{transform:translate(0,0); opacity:0.3;}
    100%{transform:translate(50px,50px); opacity:0.6;}
}

@keyframes glowMove2{
    0%{transform:translate(0,0); opacity:0.2;}
    100%{transform:translate(-50px,-50px); opacity:0.5;}
}

.login-box{
    width:400px;
    max-width:100%;
    padding:40px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    border-radius:25px;
    box-shadow:0 0 40px rgba(0,255,255,0.15);
    position:relative;
    z-index:5;
}

.logo{
    text-align:center;
    font-size:38px;
    color:white;
    margin-bottom:10px;
    font-weight:bold;
}

.logo span{
    color:#00f0ff;
}

.subtitle{
    text-align:center;
    color:#aaa;
    margin-bottom:35px;
}

.input-box{
    margin-bottom:20px;
}

.input-box input{
    width:100%;
    padding:18px;
    border:none;
    border-radius:14px;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:16px;
    outline:none;
    transition:all 0.3s ease;
}

.input-box input:focus{
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(0,240,255,0.3);
}

.input-box input::placeholder{
    color:#888;
}

.login-btn{
    width:100%;
    height:58px;
    padding:15px;
    border:none;
    border-radius:14px;
    background:linear-gradient(90deg,#00f0ff,#7b00ff);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    position:relative;
    z-index:10;
    transition:all 0.3s ease;
}

.login-btn:hover{
    opacity:0.9;
    transform:translateY(-2px);
}

.login-btn:disabled{
    opacity:0.55;
    cursor:not-allowed;
    transform:none;
}

.row-links{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:18px;
    font-size:14px;
}

.row-links a{
    color:#00f0ff;
    text-decoration:none;
}

.row-links a:hover{
    text-decoration:underline;
}

.register-text{
    margin-top:28px;
    text-align:center;
    color:#aaa;
    font-size:14px;
}

.register-text a{
    color:#00f0ff;
    text-decoration:none;
    font-weight:bold;
}

.message{
    min-height:24px;
    margin-top:20px;
    text-align:center;
    color:#00ff99;
    font-size:14px;
}

.message.error{
    color:#ff5c7a;
}

.message.success{
    color:#00ff99;
}

.loading-spinner{
    display:inline-block;
    width:18px;
    height:18px;
    border:2px solid rgba(255,255,255,.3);
    border-radius:50%;
    border-top-color:white;
    animation:spin 0.6s linear infinite;
    margin-right:8px;
    vertical-align:middle;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="login-box">

    <div class="logo">
        AI <span>TRADING</span>
    </div>

    <div class="subtitle">
        Login To Your AI Investment Account
    </div>

    <div class="input-box">
        <input type="email" id="email" placeholder="Email" autocomplete="email">
    </div>

    <div class="input-box">
        <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    </div>

    <button class="login-btn" id="loginBtn" onclick="login()">
        LOGIN
    </button>

    <div class="row-links">
        <a href="forgot.html">Forgot Password?</a>
        <a href="register.html">Create Account</a>
    </div>

    <div class="message" id="message"></div>

    <div class="register-text">
        New user?
        <a href="register.html">Register Now</a>
    </div>

</div>

<script>

// ==================== 配置 ====================
const API_BASE = "https://ai-trading-system-j5jf.onrender.com";

// ==================== 显示消息 ====================
function showMessage(text, type) {
    const messageDiv = document.getElementById("message");
    messageDiv.innerHTML = text || "";
    messageDiv.className = "message " + type;
}

// ==================== 登录函数 ====================
async function login() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const loginBtn = document.getElementById("loginBtn");
    
    // 清空之前的消息
    showMessage("", "");
    
    // 验证输入
    if (!email) {
        showMessage("Please enter your email", "error");
        return;
    }
    
    if (!password) {
        showMessage("Please enter your password", "error");
        return;
    }
    
    // 简单的邮箱格式验证
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        showMessage("Please enter a valid email address", "error");
        return;
    }
    
    // 显示加载状态
    const originalText = loginBtn.innerText;
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<div class="loading-spinner"></div> LOGINING...';
    
    try {
        const response = await fetch(`${API_BASE}/api/login`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: email,
                password: password
            })
        });
        
        const data = await response.json();
        
        if (data.success && data.user) {
            // 修复：确保用户信息包含兼容的余额字段
            const userData = {
                id: data.user.id,
                uid: data.user.uid,
                name: data.user.name,
                email: data.user.email,
                // 兼容多种余额字段
                balance: data.user.availableBalance || data.user.balance || data.user.asset || 0,
                availableBalance: data.user.availableBalance || data.user.balance || data.user.asset || 0,
                totalProfit: data.user.totalProfit || 0,
                status: data.user.status || "active"
            };
            
            // 保存用户信息到本地存储
            localStorage.removeItem("user");
            localStorage.setItem("user", JSON.stringify(userData));
            
            showMessage("Login successful! Redirecting...", "success");
            
            setTimeout(() => {
                window.location.href = "index.html";
            }, 1000);
            
        } else {
            showMessage(data.message || "Login failed. Please check your credentials.", "error");
            loginBtn.disabled = false;
            loginBtn.innerHTML = originalText;
        }
        
    } catch (err) {
        console.error("Login error:", err);
        showMessage("Network error. Please check your connection and try again.", "error");
        loginBtn.disabled = false;
        loginBtn.innerHTML = originalText;
    }
}

// ==================== 回车键登录 ====================
document.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        login();
    }
});

// ==================== 页面初始化 ====================
// 如果已经登录，自动跳转到首页
const existingUser = localStorage.getItem("user");
if (existingUser) {
    try {
        const user = JSON.parse(existingUser);
        if (user && user.id) {
            // 已登录，直接跳转
            window.location.href = "index.html";
        }
    } catch (e) {
        // 无效数据，清除
        localStorage.removeItem("user");
    }
}
</script>

</body>
</html>
