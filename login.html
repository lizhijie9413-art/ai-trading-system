<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#050816;
    min-height:100vh;
    padding:40px 16px;
    overflow-x:hidden;
    overflow-y:auto;
    display:flex;
    justify-content:center;
    align-items:center;
}

body::before{
    pointer-events:none;
    z-index:-1;
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#00f0ff22;
    filter:blur(120px);
    top:-100px;
    left:-100px;
}

body::after{
    pointer-events:none;
    z-index:-1;
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#7b00ff22;
    filter:blur(120px);
    bottom:-100px;
    right:-100px;
}

.login-box{
    width:400px;
    max-width:100%;
    padding:40px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    border-radius:25px;
    box-shadow:0 0 40px rgba(0,255,255,0.15);
    position:relative;
    z-index:5;
}

.logo{
    text-align:center;
    font-size:38px;
    color:white;
    margin-bottom:10px;
    font-weight:bold;
}

.logo span{
    color:#00f0ff;
}

.subtitle{
    text-align:center;
    color:#aaa;
    margin-bottom:35px;
}

.input-box{
    margin-bottom:20px;
}

.input-box input{
    width:100%;
    padding:18px;
    border:none;
    border-radius:14px;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:16px;
    outline:none;
}

.input-box input::placeholder{
    color:#888;
}

.login-btn{
    width:100%;
    height:58px;
    padding:15px;
    border:none;
    border-radius:14px;
    background:linear-gradient(90deg,#00f0ff,#7b00ff);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    position:relative;
    z-index:10;
}

.login-btn:hover{
    opacity:0.9;
}

.login-btn:disabled{
    opacity:0.55;
    cursor:not-allowed;
}

.row-links{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:18px;
    font-size:14px;
}

.row-links a{
    color:#00f0ff;
    text-decoration:none;
}

.row-links a:hover{
    text-decoration:underline;
}

.register-text{
    margin-top:28px;
    text-align:center;
    color:#aaa;
    font-size:14px;
}

.register-text a{
    color:#00f0ff;
    text-decoration:none;
    font-weight:bold;
}

.message{
    min-height:24px;
    margin-top:20px;
    text-align:center;
    color:#00ff99;
    font-size:14px;
}

.message.error{
    color:#ff5c7a;
}

.message.success{
    color:#00ff99;
}

</style>
</head>

<body>

<div class="login-box">

    <div class="logo">
        AI <span>TRADING</span>
    </div>

    <div class="subtitle">
        Login To Your AI Investment Account
    </div>

    <div class="input-box">
        <input type="email" id="email" placeholder="Email">
    </div>

    <div class="input-box">
        <input type="password" id="password" placeholder="Password">
    </div>

    <button class="login-btn" id="loginBtn" onclick="login()">
        LOGIN
    </button>

    <div class="row-links">
        <a href="forgot.html">Forgot Password?</a>
        <a href="register.html">Create Account</a>
    </div>

    <div class="message" id="message"></div>

    <div class="register-text">
        New user?
        <a href="register.html">Register Now</a>
    </div>

</div>

<script>

const API_BASE = "https://www.quantai.fyi";

document.addEventListener("keydown", function(event){
    if(event.key === "Enter"){
        login();
    }
});

function showMessage(text, type){
    const message = document.getElementById("message");

    message.innerHTML = text || "";
    message.className = "message " + type;
}

async function login(){

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const loginBtn = document.getElementById("loginBtn");

    if(!email || !password){
        showMessage("Please enter email and password", "error");
        return;
    }

    try{

        loginBtn.disabled = true;
        loginBtn.innerHTML = "LOGINING...";

        const response = await fetch(API_BASE + "/api/login",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                email,
                password
            })
        });

        const data = await response.json();

        if(data.success){

            localStorage.removeItem("user");
            localStorage.setItem("user", JSON.stringify(data.user));

            showMessage("Login Successful", "success");

            setTimeout(()=>{
                window.location.href = "index.html";
            },1000);

        }else{

            showMessage(data.message || "Login failed", "error");

            loginBtn.disabled = false;
            loginBtn.innerHTML = "LOGIN";
        }

    }catch(err){

        console.log(err);

        showMessage("Server Error", "error");

        loginBtn.disabled = false;
        loginBtn.innerHTML = "LOGIN";
    }

}

</script>

</body>
</html>
