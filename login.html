<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#050816;
    min-height:100vh;
    padding:40px 16px;
    overflow-x:hidden;
    overflow-y:auto;
}

body::before{
    pointer-events:none;
    z-index:-1;
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#00f0ff22;
    filter:blur(120px);
    top:-100px;
    left:-100px;
}

body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#7b00ff22;
    filter:blur(120px);
    bottom:-100px;
    right:-100px;
}

.login-box{
    width:400px;
    max-width:100%;
    padding:40px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    border-radius:25px;
    box-shadow:0 0 40px rgba(0,255,255,0.15);
    position:relative;
    z-index:5;
}

.logo{
    text-align:center;
    font-size:38px;
    color:white;
    margin-bottom:10px;
    font-weight:bold;
}

.logo span{
    color:#00f0ff;
}

.subtitle{
    text-align:center;
    color:#aaa;
    margin-bottom:35px;
}

.input-box{
    margin-bottom:20px;
}

.input-box input{
    width:100%;
    padding:18px;
    border:none;
    border-radius:14px;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:16px;
    outline:none;
}

.input-box input::placeholder{
    color:#888;
}

.login-btn{
    width:100%;
    height:58px;
    padding:15px;
    border:none;
    border-radius:14px;
    background:linear-gradient(90deg,#00f0ff,#7b00ff);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    position:relative;
    z-index:10;
}

.login-btn:hover{
    opacity:0.9;
}

.message{
    margin-top:20px;
    text-align:center;
    color:#00ff99;
}

</style>
</head>

<body>

<div class="login-box">

    <div class="logo">
        AI <span>TRADING</span>
    </div>

    <div class="subtitle">
        Login To Your AI Investment Account
    </div>

    <div class="input-box">
        <input type="email" id="email" placeholder="Email">
    </div>

    <div class="input-box">
        <input type="password" id="password" placeholder="Password">
    </div>

    <button class="login-btn" onclick="login()">
        LOGIN
    </button>

    <div class="message" id="message"></div>

</div>

<script>

async function login(){


    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const message = document.getElementById("message");

    try{

        const response = await fetch("https://www.quantai.fyi/api/login",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                email,
                password
            })

        });

        const data = await response.json();
       
        
        if(data.success){
        
            localStorage.removeItem("user");
            
            message.innerHTML = "Login Successful";

            localStorage.setItem("user", JSON.stringify(data.user));

            setTimeout(()=>{

                window.location.href = "index.html";

            },1000);

        }else{

            message.innerHTML = data.message;

        }

    }catch(err){

        message.innerHTML = "Server Error";

    }

}

</script>

</body>
</html>
