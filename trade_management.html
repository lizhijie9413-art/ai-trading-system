<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>交易管理</title>

<style>
body {
  margin: 0;
  background: #0b0b0b;
  color: white;
  font-family: Arial, sans-serif;
}

.sidebar {
  width: 260px;
  height: 100vh;
  background: #1a1a1a;
  position: fixed;
  left: 0;
  top: 0;
  padding-top: 20px;
}

.sidebar h2 {
  color: #7c4dff;
  padding-left: 20px;
  margin-bottom: 40px;
}

.sidebar a {
  display: block;
  color: white;
  text-decoration: none;
  padding: 15px 20px;
  font-size: 18px;
}

.sidebar a:hover {
  background: #333;
}

.main {
  margin-left: 260px;
  padding: 30px;
}

h1 {
  color: #7c4dff;
  font-size: 52px;
  margin-bottom: 20px;
}

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  margin-bottom: 25px;
}

.stat-card {
  background: #181818;
  border: 1px solid #333;
  border-radius: 12px;
  padding: 22px;
}

.stat-card p {
  margin: 0;
  color: #aaa;
  font-size: 15px;
}

.stat-card h2 {
  margin: 12px 0 0;
  font-size: 28px;
  color: #7c4dff;
}

.search-box {
  margin-bottom: 20px;
}

#searchInput {
  width: 420px;
  padding: 12px;
  border-radius: 6px;
  border: none;
  background: #222;
  color: white;
  font-size: 16px;
  outline: none;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #141414;
}

th,
td {
  border: 1px solid #333;
  padding: 16px;
  text-align: center;
}

th {
  background: #1f1f1f;
}

tr:hover {
  background: #1a1a1a;
}

.direction.buy {
  color: #00ff88;
  font-weight: bold;
}

.direction.sell {
  color: red;
  font-weight: bold;
}

.profit.positive {
  color: #00ff88;
  font-weight: bold;
}

.profit.negative {
  color: red;
  font-weight: bold;
}

.status.running {
  color: #00ff88;
  font-weight: bold;
}

.status.paused {
  color: orange;
  font-weight: bold;
}

.status.closed {
  color: red;
  font-weight: bold;
}

button {
  border: none;
  padding: 9px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
  margin: 3px;
}

.detail-btn {
  background: #2979ff;
  color: white;
}

.start-btn {
  background: #00c853;
  color: white;
}

.pause-btn {
  background: orange;
  color: black;
}

.close-trade-btn {
  background: red;
  color: white;
}

.modal {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.75);
}

.modal-content {
  background: #181818;
  width: 620px;
  margin: 70px auto;
  padding: 25px;
  border-radius: 10px;
  border: 1px solid #333;
}

.modal-content h2 {
  color: #7c4dff;
  margin-top: 0;
}

.detail-row {
  margin: 12px 0;
  font-size: 16px;
}

.detail-row span {
  color: #aaa;
  display: inline-block;
  width: 120px;
}

.close-btn {
  background: red;
  color: white;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>人工智能贸易</h2>
  <a href="index.html">仪表板</a>
  <a href="trade_management.html">交易管理</a>
  <a href="user_management.html">用户管理</a>
  <a href="kyc_management.html">KYC审核</a>
  <a href="order_management.html">订单管理</a>
</div>

<div class="main">
  <h1>交易管理</h1>

  <div class="stats">
    <div class="stat-card">
      <p>总交易策略</p>
      <h2 id="totalTrades">0</h2>
    </div>

    <div class="stat-card">
      <p>运行中</p>
      <h2 id="runningTrades">0</h2>
    </div>

    <div class="stat-card">
      <p>已暂停</p>
      <h2 id="pausedTrades">0</h2>
    </div>

    <div class="stat-card">
      <p>总投入</p>
      <h2 id="totalAmount">0 USDT</h2>
    </div>
  </div>

  <div class="search-box">
    <input
      type="text"
      id="searchInput"
      placeholder="搜索策略 / 交易对 / 方向 / 状态"
      oninput="searchTrades()"
    />
  </div>

  <table>
    <thead>
      <tr>
        <th>交易ID</th>
        <th>AI策略</th>
        <th>交易对</th>
        <th>方向</th>
        <th>开仓价</th>
        <th>当前价</th>
        <th>投入金额</th>
        <th>收益率</th>
        <th>状态</th>
        <th>创建时间</th>
        <th>操作</th>
      </tr>
    </thead>

    <tbody id="tradeTable"></tbody>
  </table>
</div>

<div id="tradeModal" class="modal">
  <div class="modal-content">
    <h2 id="detailTitle">交易详情</h2>

    <div class="detail-row"><span>交易ID：</span><strong id="detailId"></strong></div>
    <div class="detail-row"><span>AI策略：</span><strong id="detailStrategy"></strong></div>
    <div class="detail-row"><span>交易对：</span><strong id="detailPair"></strong></div>
    <div class="detail-row"><span>方向：</span><strong id="detailDirection"></strong></div>
    <div class="detail-row"><span>开仓价：</span><strong id="detailEntryPrice"></strong></div>
    <div class="detail-row"><span>当前价：</span><strong id="detailCurrentPrice"></strong></div>
    <div class="detail-row"><span>投入金额：</span><strong id="detailAmount"></strong></div>
    <div class="detail-row"><span>收益率：</span><strong id="detailProfitRate"></strong></div>
    <div class="detail-row"><span>状态：</span><strong id="detailStatus"></strong></div>
    <div class="detail-row"><span>创建时间：</span><strong id="detailTime"></strong></div>

    <button class="close-btn" onclick="closeTradeDetail()">关闭</button>
  </div>
</div>

<script>
let trades = [];

async function loadTrades() {
  const response = await fetch("http://localhost:3000/api/trades");
  const result = await response.json();

  trades = result.data;

  renderTrades();
}

function formatUSDT(value) {
  return Number(value).toLocaleString() + " USDT";
}

function formatPrice(value) {
  return Number(value).toLocaleString();
}

function getDirectionClass(direction) {
  return direction === "买入" ? "buy" : "sell";
}

function getStatusClass(status) {
  if (status === "运行中") return "running";
  if (status === "暂停") return "paused";
  return "closed";
}

function updateStats() {
  document.getElementById("totalTrades").innerText =
    trades.length;

  document.getElementById("runningTrades").innerText =
    trades.filter(item => item.status === "运行中").length;

  document.getElementById("pausedTrades").innerText =
    trades.filter(item => item.status === "暂停").length;

  const totalAmount = trades.reduce((sum, item) => {
    return sum + Number(item.amount || 0);
  }, 0);

  document.getElementById("totalAmount").innerText =
    formatUSDT(totalAmount);
}

function renderTrades() {
  const tbody = document.getElementById("tradeTable");
  tbody.innerHTML = "";

  trades.forEach(item => {
    const profitClass =
      Number(item.profitRate) >= 0 ? "positive" : "negative";

    const profitText =
      Number(item.profitRate) >= 0
        ? "+" + item.profitRate + "%"
        : item.profitRate + "%";

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${item.id}</td>
      <td>${item.strategy}</td>
      <td>${item.pair}</td>
      <td class="direction ${getDirectionClass(item.direction)}">${item.direction}</td>
      <td>${formatPrice(item.entryPrice)}</td>
      <td>${formatPrice(item.currentPrice)}</td>
      <td>${formatUSDT(item.amount)}</td>
      <td class="profit ${profitClass}">${profitText}</td>
      <td class="status ${getStatusClass(item.status)}">${item.status}</td>
      <td>${item.time}</td>
      <td>
        <button class="detail-btn" onclick="showTradeDetail('${item.id}')">详情</button>
        <button class="start-btn" onclick="startTrade('${item.id}')">开始</button>
        <button class="pause-btn" onclick="pauseTrade('${item.id}')">暂停</button>
        <button class="close-trade-btn" onclick="closeTrade('${item.id}')">结束</button>
      </td>
    `;

    tbody.appendChild(tr);
  });

  updateStats();
}

function searchTrades() {
  const keyword = document.getElementById("searchInput").value.toLowerCase();
  const rows = document.querySelectorAll("#tradeTable tr");

  rows.forEach(row => {
    const text = row.innerText.toLowerCase();
    row.style.display = text.includes(keyword) ? "" : "none";
  });
}

async function startTrade(id) {
  await fetch(`http://localhost:3000/api/trades/${id}/start`, {
    method: "PUT"
  });

  loadTrades();
}

async function pauseTrade(id) {
  await fetch(`http://localhost:3000/api/trades/${id}/pause`, {
    method: "PUT"
  });

  loadTrades();
}

async function closeTrade(id) {
  await fetch(`http://localhost:3000/api/trades/${id}/close`, {
    method: "PUT"
  });

  loadTrades();
}

function showTradeDetail(id) {
  const item = trades.find(trade => trade.id === id);

  document.getElementById("detailTitle").innerText =
    "交易详情：" + item.id;

  document.getElementById("detailId").innerText = item.id;
  document.getElementById("detailStrategy").innerText = item.strategy;
  document.getElementById("detailPair").innerText = item.pair;
  document.getElementById("detailDirection").innerText = item.direction;
  document.getElementById("detailEntryPrice").innerText = formatPrice(item.entryPrice);
  document.getElementById("detailCurrentPrice").innerText = formatPrice(item.currentPrice);
  document.getElementById("detailAmount").innerText = formatUSDT(item.amount);
  document.getElementById("detailProfitRate").innerText =
    Number(item.profitRate) >= 0
      ? "+" + item.profitRate + "%"
      : item.profitRate + "%";
  document.getElementById("detailStatus").innerText = item.status;
  document.getElementById("detailTime").innerText = item.time;

  document.getElementById("tradeModal").style.display = "block";
}

function closeTradeDetail() {
  document.getElementById("tradeModal").style.display = "none";
}

window.onclick = function(event) {
  const modal = document.getElementById("tradeModal");

  if (event.target === modal) {
    modal.style.display = "none";
  }
};

loadTrades();
</script>

</body>
</html>
