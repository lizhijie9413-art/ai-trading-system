<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交易管理</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#07070b;
  color:white;
}

.sidebar{
  width:260px;
  height:100vh;
  background:#151515;
  position:fixed;
  left:0;
  top:0;
  padding-top:25px;
}

.sidebar h2{
  color:#7c4dff;
  padding-left:22px;
  margin-bottom:35px;
}

.sidebar a{
  display:block;
  color:white;
  text-decoration:none;
  padding:15px 22px;
  font-size:18px;
  font-weight:bold;
}

.sidebar a:hover,
.sidebar a.active{
  background:#252525;
  color:#7c4dff;
}

.main{
  margin-left:260px;
  padding:35px;
}

h1{
  font-size:58px;
  color:#7c4dff;
  margin-bottom:28px;
}

.top-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:22px;
  margin-bottom:28px;
}

.card{
  background:#171717;
  border:1px solid #333;
  border-radius:16px;
  padding:24px;
}

.card p{
  color:#aaa;
  font-size:15px;
}

.card h2{
  color:#7c4dff;
  margin-top:16px;
  font-size:38px;
}

.search{
  margin-bottom:22px;
}

.search input{
  width:500px;
  background:#1f1f1f;
  border:none;
  color:white;
  padding:15px;
  border-radius:10px;
  font-size:16px;
  outline:none;
}

.table-box{
  background:#121212;
  border:1px solid #333;
  border-radius:16px;
  overflow:hidden;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#1d1d1d;
  color:white;
  padding:18px;
  border:1px solid #333;
  font-size:16px;
}

td{
  padding:18px;
  border:1px solid #333;
  text-align:center;
  color:#ddd;
}

tr:hover{
  background:#1b1b1b;
}

.running{
  color:orange;
  font-weight:bold;
}

.completed{
  color:#00ff88;
  font-weight:bold;
}

.profit-positive{
  color:#00ff88;
  font-weight:bold;
}

.profit-negative{
  color:red;
  font-weight:bold;
}

.action-btn{
  border:none;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  margin:2px;
}

.complete-btn{
  background:#00c853;
  color:white;
}

.refresh-btn{
  background:#2979ff;
  color:white;
}

.empty{
  text-align:center;
  color:#888;
  padding:35px;
}
</style>
</head>

<script>
const adminAuth = JSON.parse(localStorage.getItem("adminAuth") || "null");

if (!adminAuth || adminAuth.role !== "admin") {
  alert("Please login as admin");
  window.location.href = "admin_login.html";
}
</script>

<body>

<div class="sidebar">

  <h2>AI Trade Admin</h2>

  <a href="dashboard.html">仪表板</a>
  <a href="trade_management.html" class="active">交易管理</a>
  <a href="user_management.html">用户管理</a>
  <a href="kyc.html">KYC审核</a>
  <a href="order_management.html">订单管理</a>
  <a href="withdraw_management.html">提现管理</a>
  <a href="customer_service.html">客服管理</a>

</div>

<div class="main">

  <h1>交易管理</h1>

  <div class="top-grid">

    <div class="card">
      <p>总交易订单</p>
      <h2 id="totalTrades">0</h2>
    </div>

    <div class="card">
      <p>运行中</p>
      <h2 id="runningTrades">0</h2>
    </div>

    <div class="card">
      <p>已完成</p>
      <h2 id="completedTrades">0</h2>
    </div>

    <div class="card">
      <p>总投入</p>
      <h2 id="totalVolume">0 USDT</h2>
    </div>

  </div>

  <div class="search">
    <input
      type="text"
      id="searchInput"
      placeholder="搜索 UID / 用户 / 产品 / 类型 / 状态"
      oninput="searchTrades()"
    >
  </div>

  <div class="table-box">

    <table>

      <thead>
        <tr>
          <th>订单ID</th>
          <th>UID</th>
          <th>用户</th>
          <th>交易类型</th>
          <th>产品</th>
          <th>投入金额</th>
          <th>收益率</th>
          <th>收益</th>
          <th>状态</th>
          <th>开始时间</th>
        </tr>
      </thead>

      <tbody id="tradeTable"></tbody>

    </table>

  </div>

</div>

<script>

const API_BASE =
"https://ai-trading-system-j5jf.onrender.com";

let trades = [];

async function loadTrades(){

  try{

    const response =
    await fetch(
      API_BASE + "/api/admin/trade-orders"
    );

    const result =
    await response.json();

    if(result.success){

     trades = (result.data || []).filter(item => {
  return item.status === "Running";
    });

    }else{

      trades = [];
    }

    renderTrades();

  }catch(err){

    console.log(err);

    alert("交易数据加载失败");
  }
}

async function setRate(id){

  const input =
  document.getElementById("rate-" + id);

  const rate =
  Number(input.value);

  if(isNaN(rate)){
    alert("请输入收益率");
    return;
  }

  const response =
  await fetch(
    API_BASE + "/api/admin/ai-quant/set-rate/" + id,
    {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        rate
      })
    }
  );

  const result =
  await response.json();

  if(result.success){
    alert("收益率设置成功");
    loadTrades();
  }else{
    alert(result.message || "设置失败");
  }
}

function formatUSDT(value){

  return Number(value || 0)
  .toLocaleString(undefined,{
    minimumFractionDigits:2,
    maximumFractionDigits:2
  }) + " USDT";
}

function formatRate(rate){

  return Number(rate || 0)
  .toFixed(2) + "%";
}

function getStatusText(status){

  if(status === "Running")
    return "运行中";

  if(status === "Completed")
    return "已完成";

  return status || "未知";
}

function getStatusClass(status){

  if(status === "Completed")
    return "completed";

  return "running";
}

function updateStats(){

  document.getElementById(
    "totalTrades"
  ).innerText = trades.length;

  document.getElementById(
    "runningTrades"
  ).innerText =
  trades.filter(
    item => item.status === "Running"
  ).length;

  document.getElementById(
    "completedTrades"
  ).innerText =
  trades.filter(
    item => item.status === "Completed"
  ).length;

  const totalVolume =
  trades.reduce((sum,item)=>{

    return sum + Number(item.amount || 0);

  },0);

  document.getElementById(
    "totalVolume"
  ).innerText =
  formatUSDT(totalVolume);
}

function renderTrades(){

  const tbody =
  document.getElementById(
    "tradeTable"
  );

  tbody.innerHTML = "";

  if(trades.length === 0){

    tbody.innerHTML = `
      <tr>
        <td colspan="10" class="empty">
          暂无交易订单
        </td>
      </tr>
    `;

    updateStats();

    return;
  }

  trades.forEach(item=>{

    const tr =
    document.createElement("tr");

    const profitClass =
    Number(item.profit || 0) >= 0
    ? "profit-positive"
    : "profit-negative";

    tr.innerHTML = `
      <td>${item.id || ""}</td>

      <td>${item.uid || ""}</td>

      <td>${item.user || ""}</td>

      <td>${item.type || ""}</td>

      <td>${item.coin || ""}</td>

      <td>
  <input
    id="rate-${item.id}"
    type="number"
    step="0.01"
    placeholder="收益率%"
    style="width:90px;padding:6px;border-radius:6px;border:none;"
  >

  <button
    class="action-btn refresh-btn"
    onclick="setRate('${item.id}')"
  >
    设置
  </button>
</td>

      <td>${formatUSDT(item.amount)}</td>

      <td>${formatRate(item.rate)}</td>

      <td class="${profitClass}">
        ${formatUSDT(item.profit)}
      </td>

      <td class="${getStatusClass(item.status)}">
        ${getStatusText(item.status)}
      </td>

      <td>${item.time || ""}</td>
    `;

    tbody.appendChild(tr);

  });

  updateStats();
}

function searchTrades(){

  const keyword =
  document.getElementById(
    "searchInput"
  ).value.toLowerCase();

  const rows =
  document.querySelectorAll(
    "#tradeTable tr"
  );

  rows.forEach(row=>{

    const text =
    row.innerText.toLowerCase();

    row.style.display =
    text.includes(keyword)
    ? ""
    : "none";

  });
}

loadTrades();

setInterval(loadTrades,10000);

</script>

</body>
</html>
