<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Billing Statement</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}

body{
    background:
    radial-gradient(circle at 20% 10%,rgba(124,58,237,.30),transparent 30%),
    radial-gradient(circle at 85% 40%,rgba(0,212,255,.16),transparent 35%),
    linear-gradient(180deg,#030712,#050816,#020617);

    color:white;
    max-width:430px;
    min-height:100vh;
    margin:0 auto;
    overflow-x:hidden;
    padding:18px 16px 110px;
}

body::before{
    content:"";
    position:fixed;
    inset:0;

    background-image:
    linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);

    background-size:42px 42px;

    pointer-events:none;
    z-index:-1;
}

.header{
    display:flex;
    align-items:center;
    margin-bottom:26px;
}

.back-btn{
    width:52px;
    height:52px;
    border-radius:18px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(168,85,247,.22);
    color:#c084fc;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    cursor:pointer;
}

.header-title{
    padding-left:14px;
}

.header-title h1{
    font-size:28px;
    font-weight:900;
}

.header-title p{
    color:#94a3b8;
    font-size:13px;
    margin-top:4px;
}

.summary-card{
    position:relative;
    overflow:hidden;
    border-radius:30px;
    padding:24px;
    margin-bottom:24px;

    background:
    linear-gradient(
        145deg,
        rgba(15,23,42,.96),
        rgba(8,13,32,.96)
    );

    border:1px solid rgba(139,92,246,.22);

    box-shadow:
    0 0 35px rgba(139,92,246,.12);
}

.summary-title{
    color:#94a3b8;
    font-size:14px;
    margin-bottom:12px;
}

.summary-amount{
    font-size:44px;
    font-weight:900;
}

.summary-profit{
    margin-top:10px;
    color:#00f5a0;
    font-size:18px;
    font-weight:900;
}

.statement-card{
    position:relative;
    overflow:hidden;
    border-radius:26px;
    padding:20px;
    margin-bottom:16px;

    background:
    linear-gradient(
        145deg,
        rgba(15,23,42,.96),
        rgba(8,13,32,.96)
    );

    border:1px solid rgba(139,92,246,.16);
}

.statement-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:16px;
}

.statement-date{
    font-size:16px;
    font-weight:900;
}

.statement-status{
    padding:7px 14px;
    border-radius:999px;
    font-size:12px;
    font-weight:900;
}

.running{
    background:rgba(255,170,0,.12);
    color:#ffb300;
}

.completed{
    background:rgba(0,245,160,.12);
    color:#00f5a0;
}

.statement-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
}

.statement-box{
    padding:14px;
    border-radius:18px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.05);
}

.statement-box span{
    color:#94a3b8;
    font-size:12px;
}

.statement-box strong{
    display:block;
    margin-top:8px;
    font-size:16px;
}

.green{
    color:#00f5a0;
}

.blue{
    color:#38bdf8;
}

.purple{
    color:#c084fc;
}

.settle-btn{
    width:100%;
    height:52px;
    margin-top:18px;
    border:none;
    border-radius:18px;

    background:
    linear-gradient(
        135deg,
        #00d4ff,
        #8b5cf6
    );

    color:white;
    font-size:16px;
    font-weight:900;
    cursor:pointer;
}

.bottom-nav{
    position:fixed;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:100%;
    max-width:430px;
    height:84px;
    background:rgba(5,8,22,.96);
    backdrop-filter:blur(22px);
    border-top:1px solid rgba(168,85,247,.22);

    display:flex;
    justify-content:space-around;
    align-items:center;

    z-index:999;
}

.nav-item{
    width:20%;
    text-decoration:none;
    color:#64748b;
    font-size:12px;

    display:flex;
    flex-direction:column;
    align-items:center;
    gap:5px;
}

.nav-item i{
    font-size:20px;
}

.nav-item.active{
    color:#c084fc;
}

</style>
</head>

<body>

<div class="header">

    <div class="back-btn"
    onclick="window.location.href='trade.html'">

        <i class="fa-solid fa-arrow-left"></i>

    </div>

    <div class="header-title">
        <h1>Billing</h1>
        <p>AI Quant Settlement Center</p>
    </div>

</div>

<div class="summary-card">

    <div class="summary-title">
        Total Settlement Profit
    </div>

    <div class="summary-amount" id="totalProfit">
        $0.00
    </div>

    <div class="summary-profit" id="todayProfit">
        +$0.00 Today
    </div>

</div>

<div id="ordersContainer"></div>

<div class="bottom-nav">

    <a class="nav-item" href="index.html">
        <i class="fa-solid fa-house"></i>
        Home
    </a>

    <a class="nav-item" href="market.html">
        <i class="fa-solid fa-chart-column"></i>
        Markets
    </a>

    <a class="nav-item active" href="trade.html">
        <i class="fa-solid fa-arrow-right-arrow-left"></i>
        Trade
    </a>

    <a class="nav-item" href="portfolio.html">
       <i class="fa-regular fa-folder"></i>
       Portfolio
    </a>

    <a class="nav-item" href="profile.html">
        <i class="fa-regular fa-user"></i>
        Profile
    </a>

</div>

<script>

const localUser =
JSON.parse(localStorage.getItem("user"));

function formatMoney(value){

    return "$" + Number(value || 0).toLocaleString(
        undefined,
        {
            minimumFractionDigits:2,
            maximumFractionDigits:2
        }
    );
}

async function loadOrders(){

    if(!localUser || !localUser.id){
        return;
    }

const response =
await fetch(
  "https://ai-trading-system-j5jf.onrender.com/api/ai/quant/orders/" +
  localUser.id
);

    const result =
    await response.json();

    if(!result.success){
        return;
    }

    const orders =
   result.data || [];
   
    let totalProfit = 0;

    const container =
    document.getElementById("ordersContainer");

    container.innerHTML = "";

    orders.reverse().forEach(order => {

        totalProfit += Number(order.profit || 0);

        const card =
        document.createElement("div");

        card.className = "statement-card";

        const statusClass =
        order.status === "Completed"
        ? "completed"
        : "running";

        let settleButton = "";

        if(order.status !== "Completed"){

            settleButton = `
                <button
                class="settle-btn"
                onclick="settleOrder('${order._id || order.id}')"
                    Settle Profit
                </button>
            `;
        }

        card.innerHTML = `
        
        <div class="statement-top">

            <div class="statement-date">
                ${order.market}
            </div>

            <div class="statement-status ${statusClass}">
                ${order.status}
            </div>

        </div>

        <div class="statement-grid">

            <div class="statement-box">
                <span>Product</span>
                <strong>
                    ${order.product}
                </strong>
            </div>

            <div class="statement-box">
                <span>Amount</span>
                <strong class="blue">
                    ${formatMoney(order.amount)}
                </strong>
            </div>

            <div class="statement-box">
                <span>Profit</span>
                <strong class="green">
                    +${formatMoney(order.profit)}
                </strong>
            </div>

            <div class="statement-box">
                <span>AI Confidence</span>
                <strong class="purple">
                    ${order.confidence || 92}%
                </strong>
            </div>

        </div>

        ${settleButton}
        
        `;

        container.appendChild(card);

    });

    document.getElementById("totalProfit").innerText =
    formatMoney(totalProfit);

    document.getElementById("todayProfit").innerText =
    "+" + formatMoney(totalProfit) + " Today";
}

async function settleOrder(orderId){

  const response =
await fetch(
  "https://ai-trading-system-j5jf.onrender.com/api/ai/quant/settle/" +
  orderId,
  {
    method:"POST"
  }
);

    const result =
    await response.json();

    if(result.success){

        alert("Settlement Completed");

        loadOrders();
    }
}

loadOrders();
</script>

</body>
</html>
