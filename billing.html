<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Billing Statement</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}

body{
    background:
    radial-gradient(circle at 20% 10%,rgba(124,58,237,.30),transparent 30%),
    radial-gradient(circle at 85% 40%,rgba(0,212,255,.16),transparent 35%),
    linear-gradient(180deg,#030712,#050816,#020617);

    color:white;
    max-width:430px;
    min-height:100vh;
    margin:0 auto;
    overflow-x:hidden;
    padding:18px 16px 110px;
}

body::before{
    content:"";
    position:fixed;
    inset:0;

    background-image:
    linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);

    background-size:42px 42px;

    pointer-events:none;
    z-index:-1;
}

.header{
    display:flex;
    align-items:center;
    margin-bottom:26px;
}

.back-btn{
    width:52px;
    height:52px;
    border-radius:18px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(168,85,247,.22);
    color:#c084fc;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    cursor:pointer;
}

.header-title{
    padding-left:14px;
}

.header-title h1{
    font-size:28px;
    font-weight:900;
}

.header-title p{
    color:#94a3b8;
    font-size:13px;
    margin-top:4px;
}

/* 统计卡片网格 */
.stats-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-bottom:18px;
}

.stat-card{
    background:linear-gradient(145deg,rgba(15,23,42,.96),rgba(8,13,32,.96));
    border:1px solid rgba(168,85,247,.22);
    border-radius:24px;
    padding:16px;
    text-align:center;
}

.stat-label{
    color:#94a3b8;
    font-size:12px;
    margin-bottom:6px;
}

.stat-value{
    font-size:24px;
    font-weight:900;
}

.stat-value.green{color:#00f5a0;}
.stat-value.red{color:#ff4d6d;}
.stat-value.purple{color:#c084fc;}

.summary-card{
    position:relative;
    overflow:hidden;
    border-radius:30px;
    padding:24px;
    margin-bottom:24px;

    background:
    linear-gradient(
        145deg,
        rgba(15,23,42,.96),
        rgba(8,13,32,.96)
    );

    border:1px solid rgba(139,92,246,.22);

    box-shadow:
    0 0 35px rgba(139,92,246,.12);
}

.summary-title{
    color:#94a3b8;
    font-size:14px;
    margin-bottom:12px;
}

.summary-amount{
    font-size:44px;
    font-weight:900;
}

.summary-amount.positive{
    color:#00f5a0;
}

.summary-amount.negative{
    color:#ff4d6d;
}

.summary-profit{
    margin-top:10px;
    color:#00f5a0;
    font-size:18px;
    font-weight:900;
}

/* 筛选标签 */
.filter-tabs{
    display:flex;
    gap:10px;
    margin-bottom:18px;
    overflow-x:auto;
}

.filter-tabs::-webkit-scrollbar{
    display:none;
}

.filter-btn{
    padding:10px 18px;
    border-radius:30px;
    background:rgba(255,255,255,.05);
    color:#94a3b8;
    font-size:13px;
    cursor:pointer;
    white-space:nowrap;
    transition:all 0.3s ease;
}

.filter-btn.active{
    background:linear-gradient(135deg,#8b5cf6,#6d28d9);
    color:white;
}

.statement-card{
    position:relative;
    overflow:hidden;
    border-radius:26px;
    padding:20px;
    margin-bottom:16px;

    background:
    linear-gradient(
        145deg,
        rgba(15,23,42,.96),
        rgba(8,13,32,.96)
    );

    border:1px solid rgba(139,92,246,.16);
    transition:all 0.3s ease;
}

.statement-card:hover{
    transform:translateY(-2px);
    border-color:#c084fc;
}

.statement-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:16px;
}

.statement-date{
    font-size:16px;
    font-weight:900;
}

.statement-status{
    padding:7px 14px;
    border-radius:999px;
    font-size:12px;
    font-weight:900;
}

.running{
    background:rgba(255,170,0,.12);
    color:#ffb300;
}

.completed{
    background:rgba(0,245,160,.12);
    color:#00f5a0;
}

.statement-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.statement-box{
    padding:14px;
    border-radius:18px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.05);
}

.statement-box span{
    color:#94a3b8;
    font-size:12px;
}

.statement-box strong{
    display:block;
    margin-top:8px;
    font-size:16px;
}

.profit-positive{
    color:#00f5a0;
}

.profit-negative{
    color:#ff4d6d;
}

.green{
    color:#00f5a0;
}

.blue{
    color:#38bdf8;
}

.purple{
    color:#c084fc;
}

.settle-btn{
    width:100%;
    height:52px;
    margin-top:18px;
    border:none;
    border-radius:18px;

    background:
    linear-gradient(
        135deg,
        #00d4ff,
        #8b5cf6
    );

    color:white;
    font-size:16px;
    font-weight:900;
    cursor:pointer;
    transition:all 0.3s ease;
}

.settle-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 0 20px rgba(139,92,246,.4);
}

.details-btn{
    width:100%;
    height:46px;
    margin-top:14px;
    border-radius:16px;
    border:1px solid rgba(56,189,248,.28);
    background:rgba(56,189,248,.08);
    color:#7dd3fc;
    font-size:14px;
    font-weight:900;
    cursor:pointer;
}

.trade-details{
    display:none;
    margin-top:14px;
    border-radius:18px;
    border:1px solid rgba(56,189,248,.18);
    background:rgba(2,6,23,.42);
    overflow:hidden;
}

.trade-details.open{display:block;}

.detail-row{
    display:grid;
    grid-template-columns:40px 1fr 1fr 64px 76px;
    gap:8px;
    padding:12px;
    border-bottom:1px solid rgba(255,255,255,.06);
    align-items:center;
    font-size:12px;
}

.detail-row:last-child{border-bottom:none;}
.detail-head{color:#94a3b8;font-weight:900;background:rgba(255,255,255,.04);}
.detail-product{color:white;font-weight:800;}
.detail-muted{color:#94a3b8;}
.detail-up{color:#00f5a0;font-weight:900;}
.detail-down{color:#ff4d6d;font-weight:900;}

.empty{
    text-align:center;
    padding:60px 20px;
    color:#94a3b8;
}

.empty i{
    font-size:50px;
    color:#c084fc;
    margin-bottom:16px;
    display:block;
}

.bottom-nav{
    position:fixed;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:100%;
    max-width:430px;
    height:84px;
    background:rgba(5,8,22,.96);
    backdrop-filter:blur(22px);
    border-top:1px solid rgba(168,85,247,.22);

    display:flex;
    justify-content:space-around;
    align-items:center;

    z-index:999;
}

.nav-item{
    width:20%;
    text-decoration:none;
    color:#64748b;
    font-size:12px;

    display:flex;
    flex-direction:column;
    align-items:center;
    gap:5px;
}

.nav-item i{
    font-size:20px;
}

.nav-item.active{
    color:#c084fc;
}
</style>
</head>

<body>

<div class="header">

    <div class="back-btn"
    onclick="window.location.href='trade.html'">

        <i class="fa-solid fa-arrow-left"></i>

    </div>

    <div class="header-title">
        <h1>Billing</h1>
        <p>AI Quant Settlement Center</p>
    </div>

</div>

<!-- 统计卡片 - 显示盈亏明细 -->
<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-label">Total Trades</div>
        <div class="stat-value purple" id="totalTrades">0</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Profitable Trades</div>
        <div class="stat-value green" id="winTrades">0</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Loss Trades</div>
        <div class="stat-value red" id="lossTrades">0</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Win Rate</div>
        <div class="stat-value" id="winRate">0%</div>
    </div>
</div>

<div class="summary-card">

    <div class="summary-title">
        Total Settlement Profit
    </div>

    <div class="summary-amount" id="totalProfit">
        $0.00
    </div>

    <div class="summary-profit" id="todayProfit">
        +$0.00 Today
    </div>

</div>

<!-- 筛选标签 -->
<div class="filter-tabs">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="Running">Running</button>
    <button class="filter-btn" data-filter="Completed">Completed</button>
</div>

<div id="ordersContainer">
    <div class="empty">
        <i class="fa-solid fa-spinner fa-pulse"></i>
        <div>Loading orders...</div>
    </div>
</div>

<div class="bottom-nav">

    <a class="nav-item" href="index.html">
        <i class="fa-solid fa-house"></i>
        Home
    </a>

    <a class="nav-item" href="market.html">
        <i class="fa-solid fa-chart-column"></i>
        Markets
    </a>

    <a class="nav-item active" href="trade.html">
        <i class="fa-solid fa-arrow-right-arrow-left"></i>
        Trade
    </a>

    <a class="nav-item" href="portfolio.html">
       <i class="fa-regular fa-folder"></i>
       Portfolio
    </a>

    <a class="nav-item" href="profile.html">
        <i class="fa-regular fa-user"></i>
        Profile
    </a>

</div>

<script>
// ==================== 配置 ====================
const API_BASE = "https://ai-trading-system-j5jf.onrender.com";

let allOrders = [];
let currentFilter = "all";

// ==================== 获取用户信息 ====================
function getCurrentUser() {
    try {
        const user = localStorage.getItem("user");
        return user ? JSON.parse(user) : null;
    } catch (e) {
        return null;
    }
}

// ==================== 格式化金额 ====================
function formatMoney(value){
    return "$" + Number(value || 0).toLocaleString(undefined, {
        minimumFractionDigits:2,
        maximumFractionDigits:2
    });
}

function formatPercent(value, decimals = 2, showPlus = false){
    const num = Number(value);
    if(!Number.isFinite(num)) return decimals === 1 ? "0.0%" : "0.00%";
    const prefix = showPlus && num > 0 ? "+" : "";
    return prefix + num.toFixed(decimals) + "%";
}


function getProfitClass(profit){
    const num = Number(profit || 0);
    if(num > 0) return "profit-positive";
    if(num < 0) return "profit-negative";
    return "";
}

function escapeHtml(value){
    return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function renderSubTrades(order){
    const trades = Array.isArray(order.subTrades) ? order.subTrades : [];
    const orderId = order._id || order.id || "";

    if(trades.length === 0){
        return "";
    }

    const rows = trades.map((trade, index) => {
        const rate = Number(trade.rate || 0);
        const rateClass = rate >= 0 ? "detail-up" : "detail-down";
        const direction = trade.direction || (rate >= 0 ? "Up" : "Down");
        const result = trade.result || (rate >= 0 ? "Profit" : "Loss");

        return `
            <div class="detail-row">
                <div class="detail-muted">#${trade.no || index + 1}</div>
                <div>
                    <div class="detail-product">${escapeHtml(trade.product || "-")}</div>
                    <div class="detail-muted">${escapeHtml(trade.market || "-")}</div>
                </div>
                <div class="detail-muted">${escapeHtml(direction)}</div>
                <div class="${rateClass}">${formatPercent(rate, 2, true)}</div>
                <div class="${rateClass}">${escapeHtml(result)}</div>
            </div>
        `;
    }).join("");

    return `
        <button class="details-btn" onclick="toggleTradeDetails('${orderId}')">View Details</button>
        <div class="trade-details" id="details-${orderId}">
            <div class="detail-row detail-head">
                <div>No.</div>
                <div>Product</div>
                <div>Direction</div>
                <div>Rate</div>
                <div>Result</div>
            </div>
            ${rows}
        </div>
    `;
}

function toggleTradeDetails(orderId){
    const box = document.getElementById("details-" + orderId);
    if(box){
        box.classList.toggle("open");
    }
}


// ==================== 显示提示 ====================
function showToast(message, type = "info") {
    const existingToast = document.querySelector(".global-toast");
    if (existingToast) existingToast.remove();
    
    const toast = document.createElement("div");
    toast.className = "global-toast";
    toast.textContent = message;
    
    const colors = { success: "#00f5a0", error: "#ff4d6d", info: "#c084fc" };
    toast.style.cssText = `
        position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
        background: rgba(10,20,40,0.95); border: 1px solid ${colors[type] || colors.info};
        color: ${colors[type] || colors.info}; padding: 12px 24px; border-radius: 50px;
        font-size: 14px; z-index: 10000; backdrop-filter: blur(10px); white-space: nowrap;
    `;
    
    document.body.appendChild(toast);
    setTimeout(() => { toast.style.opacity = "0"; setTimeout(() => toast.remove(), 300); }, 2500);
}

// ==================== 筛选 ====================
function setFilter(filter, btn){
    currentFilter = filter;
    document.querySelectorAll(".filter-btn").forEach(btn => btn.classList.remove("active"));
    btn.classList.add("active");
    renderOrders();
}

// ==================== 加载订单列表 ====================
async function loadOrders() {
    const user = getCurrentUser();
    
    if (!user || !user.id) {
        document.getElementById("ordersContainer").innerHTML = '<div class="empty"><i class="fa-regular fa-circle-exclamation"></i><div>Please login to view orders</div></div>';
        return;
    }

    try {
        const response = await fetch(`${API_BASE}/api/ai/quant/orders/${user.id}`, {
            headers: {
                "user-id": user.id
            }
        });
        
        const result = await response.json();

        if (!result.success || !result.data) {
            document.getElementById("ordersContainer").innerHTML = '<div class="empty"><i class="fa-regular fa-folder-open"></i><div>No orders found</div></div>';
            return;
        }

        allOrders = result.data || [];
        renderOrders();

    } catch (err) {
        console.error("Load orders error:", err);
        document.getElementById("ordersContainer").innerHTML = '<div class="empty"><i class="fa-solid fa-wifi"></i><div>Failed to load orders</div></div>';
    }
}

// ==================== 渲染订单列表 ====================
function renderOrders() {
    let list = allOrders;
    
    if (currentFilter !== "all") {
        list = allOrders.filter(order => order.status === currentFilter);
    }
    
    // 计算统计数据（只统计Completed的订单）
    const completedOrders = allOrders.filter(o => o.status === "Completed");
    const winOrders = completedOrders.filter(o => Number(o.profit || 0) > 0);
    const lossOrders = completedOrders.filter(o => Number(o.profit || 0) < 0);
    const totalProfitAll = completedOrders.reduce((sum, o) => sum + Number(o.profit || 0), 0);
    const winRate = completedOrders.length > 0 
        ? ((winOrders.length / completedOrders.length) * 100).toFixed(1) 
        : 0;
    
    // 更新统计卡片
    document.getElementById("totalTrades").innerText = allOrders.length;
    document.getElementById("winTrades").innerText = winOrders.length;
    document.getElementById("lossTrades").innerText = lossOrders.length;
    document.getElementById("winRate").innerText = formatPercent(winRate, 1);
    
    // 更新总收益显示（只显示Completed的收益）
    const totalProfitElement = document.getElementById("totalProfit");
    totalProfitElement.innerText = formatMoney(totalProfitAll);
    totalProfitElement.className = totalProfitAll >= 0 ? "summary-amount positive" : "summary-amount negative";
    document.getElementById("todayProfit").innerText = (totalProfitAll >= 0 ? "+" : "") + formatMoney(totalProfitAll) + " Total";

    const container = document.getElementById("ordersContainer");
    
    if (list.length === 0) {
        container.innerHTML = `<div class="empty"><i class="fa-regular fa-folder-open"></i><div>No orders found</div></div>`;
        return;
    }

    container.innerHTML = "";

    list.forEach(order => {
        const card = document.createElement("div");
        card.className = "statement-card";

        const statusClass = order.status === "Completed" ? "completed" : "running";
        const statusText = order.status === "Completed" ? "Completed" : "Running";
        const profitNum = Number(order.profit || 0);
        const profitClass = getProfitClass(profitNum);
        const profitDisplay = profitNum >= 0 ? `+${formatMoney(profitNum)}` : `-${formatMoney(Math.abs(profitNum))}`;
        const detailsHtml = renderSubTrades(order);

        let settleButton = "";
        if (order.status !== "Completed") {
            settleButton = `
                <button class="settle-btn" onclick="settleOrder('${order._id}')">
                    Settle Now
                </button>
            `;
        }

        card.innerHTML = `
            <div class="statement-top">
                <div class="statement-date">${order.market || "AI Market"}</div>
                <div class="statement-status ${statusClass}">${statusText}</div>
            </div>
            <div class="statement-grid">
                <div class="statement-box">
                    <span>Product</span>
                    <strong>${order.product || "-"}</strong>
                </div>
                <div class="statement-box">
                    <span>Principal</span>
                    <strong class="blue">${formatMoney(order.amount)}</strong>
                </div>
                <div class="statement-box">
                    <span>Profit / Loss</span>
                    <strong class="${profitClass}">${profitDisplay}</strong>
                </div>
                <div class="statement-box">
                    <span>Yield Rate</span>
                    <strong class="${profitClass}">${formatPercent(order.profitRate)}</strong>
                </div>
                <div class="statement-box">
                    <span>Start Time</span>
                    <strong>${order.startTime ? new Date(order.startTime).toLocaleString() : "-"}</strong>
                </div>
                <div class="statement-box">
                    <span>End Time</span>
                    <strong>${order.endTime ? new Date(order.endTime).toLocaleString() : "-"}</strong>
                </div>
            </div>
            ${detailsHtml}
            ${settleButton}
        `;

        container.appendChild(card);
    });
}

// ==================== 结算订单 ====================
async function settleOrder(orderId) {
    const user = getCurrentUser();
    
    if (!user || !user.id) {
        showToast("Please login first", "error");
        return;
    }

    try {
        const response = await fetch(`${API_BASE}/api/ai/quant/settle/${orderId}`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "user-id": user.id
            }
        });

        const result = await response.json();

        if (result.success) {
            showToast("Settlement successful!", "success");
            loadOrders(); // 刷新列表
        } else {
            showToast(result.message || "Settlement failed", "error");
        }
    } catch (err) {
        console.error("Settle order error:", err);
        showToast("Network error. Please try again.", "error");
    }
}

// ==================== 绑定筛选事件 ====================
document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
        setFilter(btn.dataset.filter, btn);
    });
});

// ==================== 页面启动 ====================
loadOrders();
</script>

</body>
</html>
