<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{
  margin:0;
  background:#050816;
  color:white;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.box{
  width:360px;
  padding:32px;
  border-radius:22px;
  background:#111827;
  border:1px solid #7c3aed;
  box-shadow:0 0 40px rgba(124,58,237,.2);
}
h1{
  color:#a855f7;
  text-align:center;
  margin-bottom:24px;
}
input{
  width:100%;
  height:48px;
  margin-top:14px;
  border:none;
  border-radius:12px;
  padding:0 14px;
  background:#1f2937;
  color:white;
  font-size:16px;
  outline:none;
}
input:focus{
  border:2px solid #7c3aed;
}
button{
  width:100%;
  height:50px;
  margin-top:20px;
  border:none;
  border-radius:14px;
  background:#7c3aed;
  color:white;
  font-size:17px;
  font-weight:bold;
  cursor:pointer;
  transition:opacity .2s;
}
button:hover{opacity:0.9;}
button:disabled{opacity:0.5;cursor:not-allowed;}
.error-msg{
  color:#ff4d6d;
  font-size:13px;
  text-align:center;
  margin-top:15px;
  display:none;
}
.loading-spinner{
  display:inline-block;
  width:20px;
  height:20px;
  border:2px solid rgba(255,255,255,.3);
  border-radius:50%;
  border-top-color:white;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

<body>

<div class="box">
  <h1>Admin Login</h1>

  <input id="username" placeholder="Admin username" autocomplete="off">
  <input id="password" type="password" placeholder="Password">

  <button id="loginBtn" onclick="loginAdmin()">Login</button>
  <div id="errorMsg" class="error-msg"></div>
</div>

<script>
const API_BASE = "https://ai-trading-system-j5jf.onrender.com";

async function loginAdmin() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const errorDiv = document.getElementById("errorMsg");
    const loginBtn = document.getElementById("loginBtn");
    const originalText = loginBtn.innerHTML;

    errorDiv.style.display = "none";

    if (!username || !password) {
        errorDiv.innerText = "Please enter username and password";
        errorDiv.style.display = "block";
        return;
    }

    loginBtn.disabled = true;
    loginBtn.innerHTML = '<div class="loading-spinner"></div>';

    try {
        const response = await fetch(API_BASE + "/api/admin/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });
        const data = await response.json();

        if (data.success && data.token) {
            localStorage.setItem("adminAuth", JSON.stringify({
                role: "admin",
                username,
                token: data.token,
                loginTime: Date.now()
            }));

            errorDiv.style.color = "#00f5a0";
            errorDiv.innerText = "Login successful. Redirecting...";
            errorDiv.style.display = "block";

            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 500);
        } else {
            errorDiv.innerText = data.message || "Invalid username or password";
            errorDiv.style.display = "block";
            loginBtn.disabled = false;
            loginBtn.innerHTML = originalText;
        }
    } catch (err) {
        console.error("Admin login error:", err);
        errorDiv.innerText = "Network error. Please try again.";
        errorDiv.style.display = "block";
        loginBtn.disabled = false;
        loginBtn.innerHTML = originalText;
    }
}

document.getElementById("password").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        loginAdmin();
    }
});
</script>

</body>
</html>
